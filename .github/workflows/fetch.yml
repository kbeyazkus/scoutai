name: Fetch Data
on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch FootyStats (bugün/yarın)
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats&chosen_leagues_only=true" > data/today.json
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&date=$(date -d tomorrow +%Y-%m-%d)&include=stats&chosen_leagues_only=true" > data/tomorrow.json

      - name: Fetch API-Football (canlı maçlar)
        run: |
          curl -s "https://v3.football.api-sports.io/fixtures?live=all" \
            -H "x-apisports-key: 8763cc54795f6a9d3c1a982e903f530f" \
            > data/live.json

      - name: Commit
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/
          git commit -m "Update data" || exit 0
          git push
