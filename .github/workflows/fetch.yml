name: Fetch Data
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install requests

      - name: Fetch live scores (Football-Data.org)
        run: |
          curl -s "https://api.football-data.org/v4/matches?status=LIVE" \
            -H "X-Auth-Token: 0e77b79d4df240869858036540f1aaae" \
            > data/live.json

      - name: Commit live scores hemen
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/live.json
          git commit -m "Live scores" || true
          git push || true

      - name: Fetch FootyStats (istatistikler)
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&date=$(date -d tomorrow +%Y-%m-%d)&include=stats" > data/tomorrow_main.json

      - name: Fetch all selected leagues
        run: |
          KEY="efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e"
          SEASONS="16504 15000 14968 14924 15050 15115 14972 14930 14936 16572 14932 15068 14954 15632 14937 14931 14923 16544 16783 16576 16571 16789 15047 14893 15065 14956 15066 16558 15199 14973 15055 16627 16714 15741 15002 15015 16615 16614 15587 16213 15163 15544 15031 15717 16242 14904 16333 16243"
          for SID in $SEASONS; do
            curl -s "https://api.football-data-api.com/league-matches?key=$KEY&season_id=$SID&include=stats" > data/extra_$SID.json
            sleep 0.2
          done

      - name: Merge all leagues + live scores + AI Prediction
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, glob, re, time, requests
          from datetime import datetime, timezone

          api_key = os.environ.get("GEMINI_API_KEY")

          # --- MODELİ OTOMATİK BULAN AKILLI SİSTEM ---
          def get_best_model(key):
              if not key: return None
              print("Sana özel calisan AI modeli araniyor...")
              # Google'a senin anahtarinla hangi modellere izin verdigini soruyoruz
              url = f"https://generativelanguage.googleapis.com/v1beta/models?key={key}"
              try:
                  res = requests.get(url).json()
                  models = res.get('models', [])
                  # Once Flash modellerini ara
                  for m in models:
                      if "gemini-1.5-flash" in m['name'] and "generateContent" in m['supportedGenerationMethods']:
                          print(f"Buldum! Kullanilacak model: {m['name']}")
                          return m['name']
                  # Yoksa ilk calisan modeli al
                  for m in models:
                      if "generateContent" in m['supportedGenerationMethods']:
                          print(f"Flash bulunamadi, su model kullanilacak: {m['name']}")
                          return m['name']
              except Exception as e:
                  print(f"Model listesi alinirken hata: {e}")
              return "models/gemini-1.5-flash" # Son care varsayilan

          best_model = get_best_model(api_key)

          def get_ai_prediction(m, api_key, model_path):
              url = f"https://generativelanguage.googleapis.com/v1beta/{model_path}:generateContent?key={api_key}"
              h_name, a_name = m.get("home_name", "Ev"), m.get("away_name", "Deplasman")
              h_xg = m.get("team_a_xg_prematch", 0)
              a_xg = m.get("team_b_xg_prematch", 0)
              
              prompt = f"Analist olarak yorumla: {h_name} vs {a_name}. PPG: {m.get('home_ppg')}-{m.get('away_ppg')}, xG: {h_xg}-{a_xg}. En mantikli tercihi ve nedenini 2 kisa cumleyle acikla. '🤖 ScoutAI Yorumu:' ile basla."
              
              try:
                  res = requests.post(url, json={"contents": [{"parts": [{"text": prompt}]}]})
                  if res.status_code == 200:
                      return res.json()['candidates'][0]['content']['parts'][0]['text']
                  print(f"Hata ({h_name}): {res.status_code}")
                  return None
              except: return None

          # --- VERİLERİ YÜKLE ---
          today = datetime.now(timezone.utc).date()
          with open('data/today_main.json') as f: main = json.load(f)
          with open('data/tomorrow_main.json') as f: tmr_main = json.load(f)
          today_data = main.get('data', [])
          today_ids = {m['id'] for m in today_data}

          # --- EK LİGLERİ BİRLEŞTİR ---
          for fname in glob.glob('data/extra_*.json'):
              try:
                  with open(fname) as f: extra = json.load(f)
                  for m in extra.get('data', []):
                      ts = m.get('date_unix', 0)
                      if ts and datetime.fromtimestamp(ts, tz=timezone.utc).date() == today and m['id'] not in today_ids:
                          today_data.append(m); today_ids.add(m['id'])
                  os.remove(fname)
              except: pass

          # --- CANLI SKOR GÜNCELLEME ---
          def norm(s): return re.sub(r'[^a-z]', '', (s or '').lower())
          try:
              with open('data/live.json') as f: live_data = json.load(f)
              live_map = {norm(lm.get('homeTeam',{}).get('name','')) + '_' + norm(lm.get('awayTeam',{}).get('name','')): {'h': lm.get('score',{}).get('fullTime',{}).get('home'), 'a': lm.get('score',{}).get('fullTime',{}).get('away'), 'st': lm.get('status')} for lm in live_data.get('matches', []) if lm.get('score',{}).get('fullTime',{}).get('home') is not None}
              for m in today_data:
                  ls = live_map.get(norm(m.get('home_name', '')) + '_' + norm(m.get('away_name', '')))
                  if ls:
                      m['homeGoalCount'], m['awayGoalCount'] = ls['h'], ls['a']
                      if ls['st'] in ('IN_PLAY', 'PAUSED', 'HALFTIME'): m['status'] = 'live'
          except: pass

          # --- AI VIP ANALİZ (DÜZELTİLMİŞ FİLTRE) ---
          print("Yapay Zeka VIP Yorumlari Hazirlaniyor...")
          count = 0
          for m in today_data:
              if count >= 30: break
              if str(m.get('status', '')).lower() in ('incomplete', ''):
                  try:
                      h_xg = float(m.get("team_a_xg_prematch") or 0)
                      a_xg = float(m.get("team_b_xg_prematch") or 0)
                  except: h_xg, a_xg = 0, 0
                  
                  # Filtreyi biraz daha esnettik (daha cok mac yorumlansin diye)
                  if (h_xg + a_xg > 2.3) or abs(h_xg - a_xg) > 0.3:
                      comment = get_ai_prediction(m, api_key, best_model)
                      if comment:
                          m['ai_comment'] = comment
                          count += 1
                          print(f"Basarili: {m.get('home_name')} vs {m.get('away_name')}")
                          time.sleep(1.2)

          main['data'], tmr_main['data'] = today_data, tmr_main.get('data', [])
          with open('data/today.json', 'w') as f: json.dump(main, f)
          with open('data/tomorrow.json', 'w') as f: json.dump(tmr_main, f)
          print(f"Bitti. Toplam analiz edilen: {count} mac.")
          PYEOF

      - name: Final commit
        run: |
          git pull --rebase || true
          git add data/
          git commit -m "Stats update + ScoutAI VIP Comments (Auto-Model)" || true
          git push || true
