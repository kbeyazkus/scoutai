name: Fetch Data
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # YENİ VE RESMİ KÜTÜPHANEYİ KURUYORUZ
      - name: Install Google GenAI
        run: pip install -U google-genai

      - name: Fetch live scores (Football-Data.org)
        run: |
          curl -s "https://api.football-data.org/v4/matches?status=LIVE" \
            -H "X-Auth-Token: 0e77b79d4df240869858036540f1aaae" \
            > data/live.json

      - name: Commit live scores hemen
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/live.json
          git commit -m "Live scores" || true
          git push || true

      - name: Fetch FootyStats (istatistikler)
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&date=$(date -d tomorrow +%Y-%m-%d)&include=stats" > data/tomorrow_main.json

      - name: Fetch all selected leagues
        run: |
          KEY="efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e"
          SEASONS="16504 15000 14968 14924 15050 15115 14972 14930 14936 16572 14932 15068 14954 15632 14937 14931 14923 16544 16783 16576 16571 16789 15047 14893 15065 14956 15066 16558 15199 14973 15055 16627 16714 15741 15002 15015 16615 16614 15587 16213 15163 15544 15031 15717 16242 14904 16333 16243"
          for SID in $SEASONS; do
            curl -s "https://api.football-data-api.com/league-matches?key=$KEY&season_id=$SID&include=stats" > data/extra_$SID.json
            sleep 0.2
          done

      - name: Merge all leagues + live scores + AI Prediction
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, glob, re, time
          from datetime import datetime, timezone
          from google import genai

          # YENİ KÜTÜPHANE AYARLARI
          api_key = os.environ.get("GEMINI_API_KEY")
          client = None
          if api_key:
              try:
                  client = genai.Client(api_key=api_key)
              except Exception as e:
                  print(f"AI Başlatma Hatası: {e}")

          def get_ai_prediction(m):
              if not client: return None
              
              h_name, a_name = m.get("home_name", "Ev"), m.get("away_name", "Deplasman")
              h_ppg, a_ppg = m.get("home_ppg", 0), m.get("away_ppg", 0)
              h_xg = m.get("team_a_xg_prematch", m.get("team_a_xg", 0))
              a_xg = m.get("team_b_xg_prematch", m.get("team_b_xg", 0))
              btts, o25 = m.get("btts_potential", 0), m.get("o25_potential", 0)
              
              prompt = f"""
              Dünyanın en saygın iddaa analisti olarak şu maçı analiz et: {h_name} vs {a_name}
              Rapor: {h_name} (PPG:{h_ppg}, xG:{h_xg}), {a_name} (PPG:{a_ppg}, xG:{a_xg}). 
              BTTS:%{btts}, Üst 2.5:%{o25}.
              
              Görev: En güvenilir 1 adet iddaa tercihini tek net cümleyle yaz ve nedenini 2 kısa cümleyle açıkla. Cevabın '🤖 ScoutAI Yorumu:' ile başlasın.
              """
              try:
                  # YENİ: Model ismini tam yol (models/...) olarak belirtiyoruz
                  response = client.models.generate_content(
                      model='models/gemini-1.5-flash',
                      contents=prompt
                  )
                  time.sleep(1.5) # Kota koruması
                  return response.text
              except Exception as e:
                  print(f"AI Yorum Hatası ({h_name} vs {a_name}): {e}")
                  return None

          # MEVCUT VERİ İŞLEME KODLARI
          today = datetime.now(timezone.utc).date()
          with open('data/today_main.json') as f: main = json.load(f)
          with open('data/tomorrow_main.json') as f: tmr_main = json.load(f)

          today_data, tmr_data = main.get('data', []), tmr_main.get('data', [])
          today_ids, tmr_ids = {m['id'] for m in today_data}, {m['id'] for m in tmr_data}

          for fname in glob.glob('data/extra_*.json'):
              try:
                  with open(fname) as f: extra = json.load(f)
                  for m in extra.get('data', []):
                      ts = m.get('date_unix', 0)
                      if not ts: continue
                      d = datetime.fromtimestamp(ts, tz=timezone.utc).date()
                      if d == today and m['id'] not in today_ids:
                          today_data.append(m); today_ids.add(m['id'])
                      elif d > today and m['id'] not in tmr_ids:
                          tmr_data.append(m); tmr_ids.add(m['id'])
                  os.remove(fname)
              except: pass

          def norm(s): return re.sub(r'[^a-z]', '', (s or '').lower())
          def match_score(a, b):
              na, nb = norm(a), norm(b)
              if na == nb: return 1.0
              wa, wb = [w for w in na.split() if len(w) >= 3], [w for w in nb.split() if len(w) >= 3]
              if not wa or not wb: return 0
              matched = sum(1 for w in wa if any(w in x or x in w for x in wb))
              return matched / max(len(wa), len(wb))

          # CANLI SKOR GÜNCELLEME
          try:
              with open('data/live.json') as f: live_data = json.load(f)
              live_map = {}
              for lm in live_data.get('matches', []):
                  h_g = lm.get('score', {}).get('fullTime', {}).get('home')
                  a_g = lm.get('score', {}).get('fullTime', {}).get('away')
                  if h_g is None: continue
                  key = norm(lm.get('homeTeam', {}).get('name', '')) + '_' + norm(lm.get('awayTeam', {}).get('name', ''))
                  live_map[key] = {'h': h_g, 'a': a_g, 'min': lm.get('minute'), 'status': lm.get('status')}

              for m in today_data:
                  hn, an = norm(m.get('home_name', '')), norm(m.get('away_name', ''))
                  ls = live_map.get(hn + '_' + an)
                  if ls:
                      m['homeGoalCount'], m['awayGoalCount'] = ls['h'], ls['a']
                      m['status'] = 'live' if ls['status'] in ('IN_PLAY', 'PAUSED', 'HALFTIME') else m['status']
          except: pass

          # AI ANALİZİ (FİLTRELİ)
          print("Yapay Zeka VIP Yorumları Hazırlanıyor...")
          count = 0
          for m in today_data:
              if count >= 35: break # Her çalışmada max 35 maç
              status = str(m.get('status', '')).lower()
              if status in ('incomplete', ''):
                  h_xg = float(m.get("team_a_xg_prematch") or 0)
                  a_xg = float(m.get("team_b_xg_prematch") or 0)
                  # Sadece kaliteli (xG yüksek veya net favorisi olan) maçları analiz et
                  if (h_xg + a_xg > 2.7) or abs(h_xg - a_xg) > 0.4:
                      comment = get_ai_prediction(m)
                      if comment:
                          m['ai_comment'] = comment
                          count += 1

          main['data'], tmr_main['data'] = today_data, tmr_data
          with open('data/today.json', 'w') as f: json.dump(main, f)
          with open('data/tomorrow.json', 'w') as f: json.dump(tmr_main, f)
          print(f"Bitti. Analiz edilen: {count} maç.")
          PYEOF

      - name: Final commit
        run: |
          git pull --rebase || true
          git add data/
          git commit -m "Stats update + AI VIP Comments" || true
          git push || true
