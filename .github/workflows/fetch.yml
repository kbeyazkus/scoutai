name: Fetch Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests unidecode google-cloud-aiplatform

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run split fetch
        env:
          FOOTYSTATS_KEY: ${{ secrets.FOOTYSTATS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: "us-central1"
        run: python scripts/fetch_split_sources.py

      - name: Run split live
        env:
          FOOTYSTATS_KEY: ${{ secrets.FOOTYSTATS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: "us-central1"
        run: python scripts/live_split_sources.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update data [skip ci]"
          git push
