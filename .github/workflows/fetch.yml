name: ScoutAI Multi-Agent Syndicate 
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Fetch Live Match Data
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json

      - name: AI Prediction (Vertex AI 2.5 Multi-Agent)
        run: |
          python3 << 'PYEOF'
          import json, os, time
          from google import genai

          # Google Cloud Kimlik Doğrulama
          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']

          # 2026 Standartları: Yeni Google GenAI İstemcisi
          client = genai.Client(vertexai=True, project=project_id, location="us-central1")

          def get_expert_panel_prediction(m):
              h, a = m.get("home_name", "Bilinmeyen"), m.get("away_name", "Bilinmeyen")
              h_xg, a_xg = m.get("team_a_xg_prematch", 0), m.get("team_b_xg_prematch", 0)
              status = m.get("status", "Bilinmiyor")
              
              # BOSS AI KİMLİĞİ: Acımasız, pesimist ve lider.
              prompt = f"""
              Maç: {h} vs {a} | Durum: {status} | Prematch xG: {h_xg} - {a_xg}

              Sen 'ScoutAI' sendikasının baş analisti ve acımasız 'Boss AI'sin. 
              Amacın sadece bahis şirketlerinin açıklarını (Value) bulmak. Asla iyimser olma, kusur ara.
              Karar vermeden önce şu 3 açıyı düşün:
              1. Context (Motivasyon): Takımların puan durumuna göre bu maça ihtiyacı var mı?
              2. Smart Money (Değer): Piyasa kime oynar, gerçek Value nerede?
              3. Narrative (Algı): Medya kimi şişiriyor, tuzak nerede?

              Eğer risk fazlaysa, oran değmiyorsa veya asistanlar çelişiyorsa kesinlikle 'PAS GEÇ' kararı ver.

              Şu formatta kısa ve net yanıt ver:
              🔍 Çapraz Sorgu: (Bulduğun kusurlar ve gerçekler)
              🎯 Boss AI Kararı: (Net bahis tercihi veya PAS GEÇ)
              """
              
              try:
                  # Yeni nesil API Çağrısı
                  response = client.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=prompt
                  )
                  return response.text
              except Exception as e:
                  print(f"AI Hatası ({h}): {e}")
                  print("Not: Eğer 404 veya yetki hatasıysa, GCP Organization Policy ve Model Sürümlerini kontrol et.")
              return None

          try:
              with open('data/today_main.json') as f:
                  data = json.load(f).get('data', [])
          except:
              data = []

          print(f"Toplam {len(data)} maç bulundu. Boss AI masaya oturuyor...")
          
          count = 0
          for m in data:
              if count >= 30: break 
              st = str(m.get('status', '')).lower()
              if st in ['scheduled', 'live', 'in_play', 'incomplete', '']:
                  comment = get_expert_panel_prediction(m)
                  if comment:
                      m['ai_comment'] = comment
                      count += 1
                      print(f"Boss AI Karar Verdi: {m.get('home_name')}")
                      time.sleep(1) # API'yi yormamak için bekleme süresini 1 saniyeye çıkardık

          with open('data/today.json', 'w') as f:
              json.dump({"data": data}, f, indent=2)
          print(f"Bitti. {count} maç için sendika analizi yapıldı.")
          PYEOF

      - name: Commit Results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase || true
          git add data/
          git commit -m "ScoutAI: Boss AI ve 2026 GenAI Güncellemesi" || true
          git push || true
