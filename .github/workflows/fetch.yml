name: Fetch Data
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch live scores (Football-Data.org)
        run: |
          curl -s "https://api.football-data.org/v4/matches?status=LIVE" \
            -H "X-Auth-Token: 0e77b79d4df240869858036540f1aaae" \
            > data/live.json

      - name: Commit live scores hemen
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/live.json
          git commit -m "Live scores" || true
          git push || true

      - name: Fetch FootyStats (istatistikler)
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&date=$(date -d tomorrow +%Y-%m-%d)&include=stats" > data/tomorrow_main.json

      - name: Fetch all selected leagues
        run: |
          KEY="efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e"
          SEASONS="
            16504 15000 14968 14924 15050 15115 14972 14930 14936 16572
            14932 15068 14954 15632 14937 14931 14923 16544 16783 16576
            16571 16789 15047 14893 15065 14956 15066 16558 15199 14973
            15055 16627 16714 15741 15002 15015 16615 16614 15587 16213
            15163 15544 15031 15717 16242 14904 16333 16243
          "
          for SID in $SEASONS; do
            curl -s "https://api.football-data-api.com/league-matches?key=$KEY&season_id=$SID&include=stats" > data/extra_$SID.json
            sleep 0.2
          done

      - name: Merge all leagues + live scores
        run: |
          python3 << 'PYEOF'
          import json, os, glob, re
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).date()

          with open('data/today_main.json') as f:
              main = json.load(f)
          with open('data/tomorrow_main.json') as f:
              tmr_main = json.load(f)

          today_data = main.get('data', [])
          tmr_data = tmr_main.get('data', [])
          today_ids = {m['id'] for m in today_data}
          tmr_ids = {m['id'] for m in tmr_data}

          # Extra ligleri ekle
          for fname in glob.glob('data/extra_*.json'):
              try:
                  with open(fname) as f:
                      extra = json.load(f)
                  for m in extra.get('data', []):
                      ts = m.get('date_unix', 0)
                      if not ts:
                          continue
                      d = datetime.fromtimestamp(ts, tz=timezone.utc).date()
                      if d == today and m['id'] not in today_ids:
                          today_data.append(m)
                          today_ids.add(m['id'])
                      elif d > today and m['id'] not in tmr_ids:
                          tmr_data.append(m)
                          tmr_ids.add(m['id'])
                  os.remove(fname)
              except Exception as e:
                  print(f"Hata {fname}: {e}")

          # Football-Data.org live skorları ile güncelle
          def norm(s):
              return re.sub(r'[^a-z]', '', (s or '').lower())

          def match_score(a, b):
              na, nb = norm(a), norm(b)
              if na == nb: return 1.0
              if na in nb or nb in na: return 0.9
              # Kelime bazlı
              wa = [w for w in na.split() if len(w) >= 3]
              wb = [w for w in nb.split() if len(w) >= 3]
              if not wa or not wb: return 0
              matched = sum(1 for w in wa if any(w in x or x in w for x in wb))
              return matched / max(len(wa), len(wb))

          try:
              with open('data/live.json') as f:
                  live_data = json.load(f)
              live_matches = live_data.get('matches', [])

              # live map: tüm isim varyantlarını dene
              live_map = {}
              for lm in live_matches:
                  ht = lm.get('homeTeam', {})
                  at = lm.get('awayTeam', {})
                  score = lm.get('score', {})
                  ft = score.get('fullTime', {})
                  ht_score = score.get('halfTime', {})
                  h_goals = ft.get('home') if ft.get('home') is not None else ht_score.get('home')
                  a_goals = ft.get('away') if ft.get('away') is not None else ht_score.get('away')
                  minute = lm.get('minute')
                  status = lm.get('status', '')
                  if h_goals is None: continue
                  # Birden fazla isim varyantı sakla
                  for hn in [ht.get('name',''), ht.get('shortName',''), ht.get('tla','')]:
                      for an in [at.get('name',''), at.get('shortName',''), at.get('tla','')]:
                          if hn and an:
                              key = norm(hn) + '_' + norm(an)
                              live_map[key] = {'h': h_goals, 'a': a_goals, 'min': minute, 'status': status}

              updated = 0
              for m in today_data:
                  hn = norm(m.get('home_name', ''))
                  an = norm(m.get('away_name', ''))
                  key = hn + '_' + an

                  # Direkt eşleşme
                  ls = live_map.get(key)

                  # Bulunamadıysa fuzzy eşleştir
                  if not ls:
                      best_score = 0
                      for lkey, lval in live_map.items():
                          parts = lkey.split('_')
                          if len(parts) != 2: continue
                          lhn, lan = parts
                          hs = match_score(hn, lhn)
                          as_ = match_score(an, lan)
                          total = hs + as_
                          if total > best_score and hs >= 0.7 and as_ >= 0.7:
                              best_score = total
                              ls = lval

                  if ls:
                      m['homeGoalCount'] = ls['h']
                      m['awayGoalCount'] = ls['a']
                      m['totalGoalCount'] = (ls['h'] or 0) + (ls['a'] or 0)
                      if ls['min']:
                          m['elapsed'] = ls['min']
                      if ls['status'] == 'PAUSED':
                          m['elapsed'] = 'HY'
                          m['status'] = 'live'
                      elif ls['status'] in ('IN_PLAY', 'HALFTIME'):
                          m['status'] = 'live'
                      updated += 1
                      print(f"✅ Güncellendi: {m.get('home_name')} {ls['h']}-{ls['a']} {m.get('away_name')} ({ls['status']})")
              print(f"Toplam güncellenen: {updated} maç")
          except Exception as e:
              print(f"Live skor hatası: {e}")

          main['data'] = today_data
          tmr_main['data'] = tmr_data

          with open('data/today.json', 'w') as f:
              json.dump(main, f)
          with open('data/tomorrow.json', 'w') as f:
              json.dump(tmr_main, f)

          os.remove('data/today_main.json')
          os.remove('data/tomorrow_main.json')
          print(f"Bugün: {len(today_data)}, Yarın: {len(tmr_data)}")
          PYEOF

      - name: Final commit
        run: |
          git pull --rebase || true
          git add data/
          git commit -m "Stats update" || true
          git push || true
