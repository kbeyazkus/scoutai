name: ScoutAI Fetch

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: scoutai-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests unidecode google-genai

      - name: Run fetch pipeline
        env:
          FOOTYSTATS_KEY: ${{ secrets.FOOTYSTATS_KEY }}
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python scripts/fetch.py

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Bot"
          git pull --rebase || true
          git add data/today.json data/today_main.json data/tomorrow.json data/match_map.json data/health.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update prematch intelligence" && git push)
