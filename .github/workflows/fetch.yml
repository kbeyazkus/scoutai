name: ScoutAI Global Intelligence (V4 - Final)
on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Install dependencies
        run: pip install requests google-genai
      - name: AI Prediction
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests
          from google import genai

          # 1. Mevcut Veriyi Oku (Skorları korumak için)
          try:
              with open('data/today.json', 'r') as f:
                  existing_data = {m['id']: m for m in json.load(f).get('data', [])}
          except: existing_data = {}

          # 2. Yeni Veriyi Çek
          f_url = "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats,odds"
          new_matches = requests.get(f_url).json().get('data', [])

          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              client = genai.Client(vertexai=True, project=json.load(f)['project_id'], location="us-central1")

          final_list = []
          for m in new_matches[:30]:
              m_id = m['id']
              
              # KRITIK: Eğer maç zaten oynanıyorsa veya bitmişse mevcut skoru koru
              if m_id in existing_data:
                  old = existing_data[m_id]
                  if old.get('status') == 'live' or int(old.get('homeGoalCount', 0)) > 0:
                      m['homeGoalCount'] = old['homeGoalCount']
                      m['awayGoalCount'] = old['awayGoalCount']
                      m['boss_ai_decision'] = old.get('boss_ai_decision')
                      m['status'] = old['status']

              # Sadece yorumu olmayan maçlara yorum yap (Kota dostu)
              if not m.get('boss_ai_decision'):
                  prompt = f"BOSS AI: {m.get('home_name')} vs {m.get('away_name')}. xG: {m.get('team_a_xg_prematch')}-{m.get('team_b_xg_prematch')}. ANALİZ VE EMİR VER."
                  try:
                      res = client.models.generate_content(model='gemini-2.5-flash', contents=prompt)
                      m['boss_ai_decision'] = res.text
                      time.sleep(1)
                  except: pass
              
              final_list.append(m)

          with open('data/today.json', 'w') as f:
              json.dump({"data": final_list}, f, indent=2)
          PYEOF
      - name: Final Push
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI"
          git pull --rebase || true
          git add data/
          git commit -m "Fetch Update: Scores Preserved" || true
          git push || true
