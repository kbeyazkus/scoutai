name: ScoutAI Global Intelligence (V5 - FootyStats Core)
on:
  schedule:
    - cron: '0 6 * * *' # Her sabah 06:00
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: FootyStats İstihbarat Toplama (Ajan 1, 2, 5, 11)
        run: |
          cat > /tmp/fetch.py << 'PYEOF'
          import json, os, requests

          FS_KEY = "efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e"
          file_path = 'data/today.json'
          
          url = f"https://api.football-data-api.com/todays-matches?key={FS_KEY}&include=stats,odds"
          try:
              res = requests.get(url)
              matches = res.json().get('data', [])
              print(f"📡 FootyStats'tan {len(matches)} macin derin istihbarati cekildi.")
          except Exception as e:
              print(f"FootyStats Hatasi: {e}")
              exit(0)

          final_list = []
          for m in matches:
              # Radarin kullanacagi standart sablon
              match_data = {
                  "id": str(m.get('id', '')),
                  "home_name": m.get('home_name', 'Ev Sahibi'),
                  "away_name": m.get('away_name', 'Deplasman'),
                  "team_a_xg_prematch": m.get('team_a_xg_prematch', '0'),
                  "team_b_xg_prematch": m.get('team_b_xg_prematch', '0'),
                  "odds_ft_1": m.get('odds_ft_1', '-'),
                  "odds_ft_x": m.get('odds_ft_x', '-'),
                  "odds_ft_2": m.get('odds_ft_2', '-'),
                  "team_a_ppg": m.get('team_a_ppg', '0'), # Ev Sahibi Formu
                  "team_b_ppg": m.get('team_b_ppg', '0'), # Deplasman Formu
                  "homeGoalCount": 0,
                  "awayGoalCount": 0,
                  "status": "incomplete",
                  "elapsed": 0,
                  "boss_ai_decision": ""
              }
              final_list.append(match_data)

          os.makedirs('data', exist_ok=True)
          with open(file_path, 'w', encoding='utf-8') as f:
              json.dump({"data": final_list}, f, indent=2, ensure_ascii=False)
          print("✅ Sabah İstihbarati today.json dosyasina kilitlendi.")
          PYEOF
          python3 /tmp/fetch.py

      - name: Final Push
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Commander"
          git pull --rebase || true
          git add data/today.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔴 Fetch: FootyStats İstihbaratı Toplandı" && git push)
          
