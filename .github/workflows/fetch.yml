name: ScoutAI Light Speed Update (Vertex AI)
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-cloud-aiplatform

      - name: AI Prediction (Vertex AI VIP Mode)
        run: |
          python3 << 'PYEOF'
          import json, os, requests, time
          import vertexai
          from vertexai.generative_models import GenerativeModel

          # Google Cloud Proje Bilgilerini JSON'dan Çekiyoruz
          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']

          vertexai.init(project=project_id, location="us-central1")
          model = GenerativeModel("gemini-1.5-flash")

          def get_ai_prediction(m):
              h, a = m.get("home_name"), m.get("away_name")
              h_xg, a_xg = m.get("team_a_xg_prematch", 0), m.get("team_b_xg_prematch", 0)
              status = m.get("status", "")
              
              prompt = f"Analist olarak yorumla: {h} vs {a}. Durum: {status}. xG: {h_xg}-{a_xg}. En mantıklı tercihi ve nedenini 2 kısa cümleyle yaz. '🤖 ScoutAI Yorumu:' ile başla."
              
              try:
                  response = model.generate_content(prompt)
                  return response.text
              except Exception as e:
                  print(f"AI Hatası: {e}")
              return None

          try:
              with open('data/today_main.json') as f: data = json.load(f).get('data', [])
          except: data = []

          print(f"{len(data)} maç taranıyor (Vertex AI)...")
          
          count = 0
          for m in data:
              if count >= 35: break 
              st = str(m.get('status', '')).lower()
              if st in ('incomplete', '', 'scheduled', 'live', 'in-play'):
                  comment = get_ai_prediction(m)
                  if comment:
                      m['ai_comment'] = comment
                      count += 1
                      print(f"Analiz Tamam: {m.get('home_name')}")
                      time.sleep(0.1)

          with open('data/today.json', 'w') as f: json.dump({"data": data}, f)
          print(f"Bitti. {count} analiz yapıldı.")
          PYEOF

      - name: Fetch Live Match Data
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json

      - name: Commit Results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase || true
          git add data/
          git commit -m "ScoutAI: Vertex AI Stable Update" || true
          git push || true
