name: ScoutAI Light Speed Update
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Live Match Data
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json

      - name: AI Prediction (VIP Fast Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, requests, time

          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          # Kararlı sürüm (v1) kullanılarak hata riski ortadan kaldırıldı
          url = f"https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key={api_key}"

          def get_ai_prediction(m):
              h, a = m.get("home_name"), m.get("away_name")
              h_xg, a_xg = m.get("team_a_xg_prematch", 0), m.get("team_b_xg_prematch", 0)
              status = m.get("status", "")
              
              prompt = f"Analist olarak yorumla: {h} vs {a}. Durum: {status}. xG: {h_xg}-{a_xg}. En mantıklı tercihi ve nedenini 2 kısa cümleyle yaz. '🤖 ScoutAI Yorumu:' ile başla."
              
              try:
                  payload = {"contents": [{"parts": [{"text": prompt}]}]}
                  res = requests.post(url, json=payload, timeout=15)
                  
                  if res.status_code == 200:
                      return res.json()['candidates'][0]['content']['parts'][0]['text']
                  else:
                      print(f"Hata ({res.status_code}): {res.text[:100]}")
              except Exception as e:
                  print(f"Baglanti Hatasi: {e}")
              return None

          try:
              with open('data/today_main.json') as f: 
                  data = json.load(f).get('data', [])
          except: 
              data = []

          print(f"{len(data)} maç taranıyor...")
          
          count = 0
          for m in data:
              if count >= 35: break 
              
              st = str(m.get('status', '')).lower()
              if st in ('incomplete', '', 'scheduled', 'live', 'in-play'):
                  comment = get_ai_prediction(m)
                  if comment:
                      m['ai_comment'] = comment
                      count += 1
                      print(f"Analiz Başarılı: {m.get('home_name')}")
                      time.sleep(0.3)

          with open('data/today.json', 'w') as f: 
              json.dump({"data": data}, f)
          print(f"Bitti. {count} analiz yapıldı.")
          PYEOF

      - name: Commit Results
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git pull --rebase || true
          git add data/
          git commit -m "ScoutAI: Stable v1 Update" || true
          git push || true
