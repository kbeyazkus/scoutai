name: ScoutAI Global Intelligence (Fixed Core)
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: FootyStats prematch verisini çek
        env:
          FOOTYSTATS_KEY: ${{ secrets.FOOTYSTATS_KEY }}
        run: |
          cat > /tmp/fetch.py << 'PYEOF'
          import json, os, requests
          from pathlib import Path

          FS_KEY = os.environ.get("FOOTYSTATS_KEY", "").strip()
          if not FS_KEY:
              raise SystemExit("FOOTYSTATS_KEY secret eksik.")

          today_path = Path('data/today.json')
          tomorrow_path = Path('data/tomorrow.json')
          os.makedirs('data', exist_ok=True)

          existing = {}
          if today_path.exists():
              try:
                  old = json.loads(today_path.read_text(encoding='utf-8')).get('data', [])
                  existing = {str(x.get('id')): x for x in old if x.get('id') is not None}
              except Exception:
                  existing = {}

          url = f"https://api.football-data-api.com/todays-matches?key={FS_KEY}&include=stats,odds"
          res = requests.get(url, timeout=30)
          res.raise_for_status()
          matches = res.json().get('data', [])
          print(f"📡 FootyStats'tan {len(matches)} maç çekildi.")

          final_list = []
          for m in matches:
              mid = str(m.get('id', ''))
              prev = existing.get(mid, {})

              record = dict(m)
              record['id'] = mid
              record['home_name'] = m.get('home_name', prev.get('home_name', 'Ev Sahibi'))
              record['away_name'] = m.get('away_name', prev.get('away_name', 'Deplasman'))
              record['home_ppg'] = m.get('home_ppg', m.get('team_a_ppg', prev.get('home_ppg', prev.get('team_a_ppg', '0'))))
              record['away_ppg'] = m.get('away_ppg', m.get('team_b_ppg', prev.get('away_ppg', prev.get('team_b_ppg', '0'))))
              record['team_a_ppg'] = m.get('team_a_ppg', record['home_ppg'])
              record['team_b_ppg'] = m.get('team_b_ppg', record['away_ppg'])
              record['team_a_xg_prematch'] = m.get('team_a_xg_prematch', prev.get('team_a_xg_prematch', '0'))
              record['team_b_xg_prematch'] = m.get('team_b_xg_prematch', prev.get('team_b_xg_prematch', '0'))
              record['homeGoalCount'] = prev.get('homeGoalCount', m.get('homeGoalCount', 0))
              record['awayGoalCount'] = prev.get('awayGoalCount', m.get('awayGoalCount', 0))
              record['totalGoalCount'] = record['homeGoalCount'] + record['awayGoalCount']
              record['status'] = prev.get('status', m.get('status', 'incomplete'))
              record['elapsed'] = prev.get('elapsed', 0)
              record['boss_ai_decision'] = prev.get('boss_ai_decision', '')
              record['live_stats_summary'] = prev.get('live_stats_summary', '')
              record['live_last_update'] = prev.get('live_last_update', '')
              final_list.append(record)

          today_path.write_text(json.dumps({"data": final_list}, ensure_ascii=False, indent=2), encoding='utf-8')

          if not tomorrow_path.exists() or tomorrow_path.read_text(encoding='utf-8').strip() in {'', '[]', '{}'}:
              tomorrow_path.write_text(json.dumps({"data": []}, ensure_ascii=False, indent=2), encoding='utf-8')

          print("✅ data/today.json güncellendi.")
          PYEOF
          python3 /tmp/fetch.py

      - name: Final Push
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Commander"
          git pull --rebase || true
          git add data/today.json data/tomorrow.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔴 Fetch: FootyStats prematch verisi güncellendi" && git push)
