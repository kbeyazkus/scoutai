name: Fetch Data
on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch FootyStats today (canlı skorlar dahil)
        run: |
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats" > data/today_main.json
          curl -s "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&date=$(date -d tomorrow +%Y-%m-%d)&include=stats" > data/tomorrow_main.json

      - name: Commit today.json hemen (canlı skorlar için)
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          python3 << 'PYEOF'
          import json
          # today_main.json'u today.json'a kopyala (lig ekleme olmadan hızlı commit için)
          with open('data/today_main.json') as f:
              main = json.load(f)
          # Varsa eski extra maçları koru
          try:
              with open('data/today.json') as f:
                  old = json.load(f)
              old_data = {m['id']: m for m in old.get('data', [])}
              new_data = {m['id']: m for m in main.get('data', [])}
              # Yeni veriden gelen maçları güncelle, geri kalanları koru
              old_data.update(new_data)
              main['data'] = list(old_data.values())
          except:
              pass
          with open('data/today.json', 'w') as f:
              json.dump(main, f)
          PYEOF
          git add data/today.json data/tomorrow_main.json
          git commit -m "Live score update" || true
          git push || true

      - name: Fetch all selected leagues
        run: |
          KEY="efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e"
          SEASONS="
            16504 15000 14968 14924 15050 15115 14972 14930 14936 16572
            14932 15068 14954 15632 14937 14931 14923 16544 16783 16576
            16571 16789 15047 14893 15065 14956 15066 16558 15199 14973
            15055 16627 16714 15741 15002 15015 16615 16614 15587 16213
            15163 15544 15031 15717 16242 14904 16333 16243
          "
          for SID in $SEASONS; do
            curl -s "https://api.football-data-api.com/league-matches?key=$KEY&season_id=$SID&include=stats" > data/extra_$SID.json
            sleep 0.2
          done

      - name: Merge all leagues into today.json
        run: |
          python3 << 'PYEOF'
          import json, os, glob
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).date()

          with open('data/today.json') as f:
              main = json.load(f)
          with open('data/tomorrow_main.json') as f:
              tmr_main = json.load(f)

          today_data = main.get('data', [])
          tmr_data = tmr_main.get('data', [])
          today_ids = {m['id'] for m in today_data}
          tmr_ids = {m['id'] for m in tmr_data}

          added_today = 0
          added_tmr = 0

          for fname in glob.glob('data/extra_*.json'):
              try:
                  with open(fname) as f:
                      extra = json.load(f)
                  for m in extra.get('data', []):
                      ts = m.get('date_unix', 0)
                      if not ts:
                          continue
                      d = datetime.fromtimestamp(ts, tz=timezone.utc).date()
                      if d == today and m['id'] not in today_ids:
                          today_data.append(m)
                          today_ids.add(m['id'])
                          added_today += 1
                      elif d > today and m['id'] not in tmr_ids:
                          tmr_data.append(m)
                          tmr_ids.add(m['id'])
                          added_tmr += 1
                  os.remove(fname)
              except Exception as e:
                  print(f"Hata {fname}: {e}")

          main['data'] = today_data
          tmr_main['data'] = tmr_data

          with open('data/today.json', 'w') as f:
              json.dump(main, f)
          with open('data/tomorrow.json', 'w') as f:
              json.dump(tmr_main, f)

          os.remove('data/tomorrow_main.json')
          print(f"Bugün: {len(today_data)} maç (+{added_today}), Yarın: {len(tmr_data)} maç (+{added_tmr})")
          PYEOF

      - name: Final commit
        run: |
          git pull --rebase || true
          git add data/
          git commit -m "Stats update" || true
          git push || true
