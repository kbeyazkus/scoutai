name: ScoutAI Sportmonks Radar (Fixed)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  live_mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests unidecode google-genai

      - name: Execute Sportmonks Live Radar
        env:
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
        run: |
          cat > /tmp/live_radar.py << 'PYEOF'
          import json
          import os
          import re
          import time
          import difflib
          from pathlib import Path
          from datetime import datetime, timezone

          import requests
          from unidecode import unidecode
          from google import genai

          SM_KEY = os.environ.get("SPORTMONKS_KEY", "").strip()
          if not SM_KEY:
              raise SystemExit("SPORTMONKS_KEY secret eksik.")

          creds_path = os.environ.get('GOOGLE_APPLICATION_CREDENTIALS')
          if not creds_path or not os.path.exists(creds_path):
              raise SystemExit("GOOGLE_APPLICATION_CREDENTIALS bulunamadı.")

          with open(creds_path, 'r', encoding='utf-8') as f:
              info = json.load(f)
          client = genai.Client(vertexai=True, project=info['project_id'], location="us-central1")

          today_path = Path('data/today.json')
          live_path = Path('data/live.json')
          if not today_path.exists():
              raise SystemExit("data/today.json yok. Önce fetch workflow'u çalışmalı.")

          fs_data = json.loads(today_path.read_text(encoding='utf-8')).get('data', [])
          if not isinstance(fs_data, list):
              fs_data = []

          LIVE_STATES = {
              'INPLAY_1ST_HALF', 'INPLAY_2ND_HALF', 'HT', 'INPLAY_ET', 'INPLAY_ET_2', 'BREAK'
          }

          url = (
              f"https://api.sportmonks.com/v3/football/livescores"
              f"?api_token={SM_KEY}&include=participants;scores;state;statistics.type;periods"
          )
          res = requests.get(url, timeout=30)
          res.raise_for_status()
          live_matches = res.json().get('data', [])
          live_matches = [m for m in live_matches if m.get('state', {}).get('developer_name', '') in LIVE_STATES]

          if not live_matches:
              live_path.write_text(json.dumps({"matches": [], "resultSet": {"count": 0}}, ensure_ascii=False, indent=2), encoding='utf-8')
              print("Şu an canlı maç yok.")
              raise SystemExit(0)

          def clean_name(name: str) -> str:
              name = unidecode(str(name or '')).lower()
              name = re.sub(r'[^a-z0-9 ]+', ' ', name)
              words = [w for w in name.split() if w not in {
                  'fc', 'cf', 'club', 'de', 'la', 'real', 'sk', 'fk', 'ac', 'sc', 'the'
              }]
              return ''.join(words)

          def get_participant(parts, location):
              for p in parts:
                  meta = p.get('meta', {}) or {}
                  if meta.get('location') == location:
                      return p
              if location == 'home':
                  return parts[0] if parts else {}
              return parts[1] if len(parts) > 1 else {}

          def get_score(scores, side):
              for s in scores:
                  score_obj = s.get('score', {}) or {}
                  if score_obj.get('participant') == side and s.get('description') == 'CURRENT':
                      return int(score_obj.get('goals') or 0)
              return 0

          def estimate_minute(match, state_name):
              if state_name in {'HT', 'BREAK'}:
                  return 'HY'

              direct_paths = [
                  match.get('minute'),
                  (match.get('time') or {}).get('minute'),
                  (match.get('currentPeriod') or {}).get('minutes'),
              ]
              for value in direct_paths:
                  if value is None:
                      continue
                  try:
                      value = int(value)
                      if value > 0:
                          return value
                  except Exception:
                      pass

              ts = match.get('starting_at_timestamp')
              if ts:
                  try:
                      total = max(1, int((time.time() - int(ts)) / 60))
                      if state_name == 'INPLAY_1ST_HALF':
                          return min(total, 45)
                      if state_name in {'INPLAY_2ND_HALF', 'INPLAY_ET', 'INPLAY_ET_2'}:
                          total = max(46, total - 15)
                          return min(total, 120)
                  except Exception:
                      pass
              return 0

          def find_fs_match(sm_home, sm_away, fs_list):
              sm_h = clean_name(sm_home)
              sm_a = clean_name(sm_away)
              best = None
              best_score = 0.0
              for item in fs_list:
                  fh = clean_name(item.get('home_name'))
                  fa = clean_name(item.get('away_name'))
                  h_ratio = difflib.SequenceMatcher(None, sm_h, fh).ratio()
                  a_ratio = difflib.SequenceMatcher(None, sm_a, fa).ratio()
                  combo = (h_ratio + a_ratio) / 2
                  exact = (sm_h == fh and sm_a == fa)
                  contains = ((sm_h in fh or fh in sm_h) and (sm_a in fa or fa in sm_a))
                  if exact:
                      return item, 1.0
                  if contains and combo >= 0.55:
                      if combo > best_score:
                          best = item
                          best_score = combo
                  elif h_ratio >= 0.72 and a_ratio >= 0.72 and combo > best_score:
                      best = item
                      best_score = combo
              return best, best_score

          ALL_DECISIONS = [
              'MS1', 'MSX', 'MS2', '1X', 'X2', '12',
              'Üst 0.5', 'Üst 1.5', 'Üst 2.5', 'Üst 3.5', 'Alt 2.5', 'Alt 1.5',
              'KG Var', 'KG Yok',
              'Ev -0.5', 'Ev -1', 'Ev -1.5', 'Ev +0.5', 'Ev +1', 'Ev +1.5',
              'Depl -0.5', 'Depl -1', 'Depl -1.5', 'Depl +0.5', 'Depl +1', 'Depl +1.5',
              'İY MS1', 'İY MSX', 'İY MS2', 'İY Üst 0.5', 'İY Üst 1.5',
              'Sıradaki gol ev', 'Sıradaki gol deplasman', 'Sonraki korner', 'Kalan sürede gol çıkar',
              'PAS GEÇ'
          ]

          schema = {
              "type": "object",
              "properties": {
                  "status_summary": {"type": "string"},
                  "final_decision": {"type": "string", "enum": ALL_DECISIONS},
                  "bankroll_percent": {"type": "integer", "minimum": 0, "maximum": 10},
                  "risk_score": {"type": "integer", "minimum": 1, "maximum": 10},
                  "confidence": {"type": "integer", "minimum": 0, "maximum": 100},
                  "reason_codes": {
                      "type": "array",
                      "items": {
                          "type": "string",
                          "enum": [
                              "PREMATCH_EDGE", "LIVE_PRESSURE", "LOW_DATA", "CONFLICT", "SCORE_STATE",
                              "ODDS_SIGNAL", "SECOND_HALF", "FIRST_HALF", "NO_VALUE"
                          ]
                      }
                  }
              },
              "required": [
                  "status_summary", "final_decision", "bankroll_percent",
                  "risk_score", "confidence", "reason_codes"
              ]
          }

          def build_allowed_decisions(state_name, h_score, a_score, has_stats):
              allowed = set(ALL_DECISIONS)
              # İlk yarı değilse ilk yarı marketlerini kapat
              if state_name not in {'INPLAY_1ST_HALF'}:
                  allowed -= {'İY MS1', 'İY MSX', 'İY MS2', 'İY Üst 0.5', 'İY Üst 1.5'}
              # Canlı istatistik yoksa canlı aksiyon marketlerini kapat
              if not has_stats:
                  allowed -= {'Sıradaki gol ev', 'Sıradaki gol deplasman', 'Sonraki korner', 'Kalan sürede gol çıkar'}
              # 4+ gol olduysa düşük alt marketleri kapat
              if h_score + a_score >= 4:
                  allowed -= {'Alt 2.5', 'Alt 1.5'}
              return sorted(allowed)

          def format_decision(payload):
              return (
                  f"🔴 DURUM ÖZETİ: {payload['status_summary']}\n"
                  f"🎯 NİHAİ KARAR: {payload['final_decision']}\n"
                  f"💰 KASA/RİSK: %{payload['bankroll_percent']} Kasa | Risk {payload['risk_score']}/10 | Güven {payload['confidence']}/100"
              )

          live_payload = {"matches": [], "resultSet": {"count": len(live_matches)}}
          updated = False

          for lm in live_matches:
              parts = lm.get('participants', []) or []
              if len(parts) < 2:
                  continue

              home_p = get_participant(parts, 'home')
              away_p = get_participant(parts, 'away')
              sm_home = home_p.get('name', '')
              sm_away = away_p.get('name', '')
              state_name = lm.get('state', {}).get('developer_name', '')

              scores = lm.get('scores', []) or []
              h_score = get_score(scores, 'home')
              a_score = get_score(scores, 'away')
              minute = estimate_minute(lm, state_name)

              live_payload['matches'].append({
                  "homeTeam": {"name": sm_home},
                  "awayTeam": {"name": sm_away},
                  "score": {"fullTime": {"home": h_score, "away": a_score}},
                  "minute": None if minute == 'HY' else minute,
                  "state": state_name,
              })

              matched, ratio = find_fs_match(sm_home, sm_away, fs_data)
              if not matched:
                  print(f"❌ Eşleşmedi: {sm_home} vs {sm_away}")
                  continue

              matched['homeGoalCount'] = h_score
              matched['awayGoalCount'] = a_score
              matched['totalGoalCount'] = h_score + a_score
              matched['status'] = 'live'
              matched['elapsed'] = minute
              matched['live_last_update'] = datetime.now(timezone.utc).isoformat()
              updated = True

              stats = lm.get('statistics', []) or []
              stat_names = []
              for s in stats[:8]:
                  typ = (s.get('type') or {})
                  name = typ.get('developer_name') or typ.get('name')
                  if name:
                      stat_names.append(str(name))
              has_stats = len(stats) > 0
              matched['live_stats_summary'] = (
                  f"İstatistik satırı: {len(stats)} | Türler: {', '.join(stat_names[:5])}" if has_stats
                  else "Canlı detay istatistik yok"
              )

              xg_h = matched.get('team_a_xg_prematch', 0)
              xg_a = matched.get('team_b_xg_prematch', 0)
              odds_1 = matched.get('odds_ft_1', '-')
              odds_x = matched.get('odds_ft_x', '-')
              odds_2 = matched.get('odds_ft_2', '-')
              ppg_h = matched.get('home_ppg', matched.get('team_a_ppg', 0))
              ppg_a = matched.get('away_ppg', matched.get('team_b_ppg', 0))
              btts = matched.get('btts_potential', 0)
              over25 = matched.get('o25_potential', matched.get('over25_potential', 0))

              allowed = build_allowed_decisions(state_name, h_score, a_score, has_stats)
              live_weight = 90 if state_name in {'INPLAY_2ND_HALF', 'INPLAY_ET', 'INPLAY_ET_2'} else 55
              prematch_weight = 10 if live_weight == 90 else 45

              prompt = "\n".join([
                  "Sen disiplinli bir canlı bahis karar motorusun.",
                  "Kurallar:",
                  "- Sadece ALLOWED_DECISIONS listesinden BİR seçim yap veya PAS GEÇ seç.",
                  "- Enum dışında hiçbir değer üretme.",
                  "- Veriler çelişkiliyse PAS GEÇ.",
                  "- İkinci yarıda live_weight yüksek olduğu için canlı sinyalleri daha fazla önemse.",
                  "- Canlı istatistik yoksa canlı aksiyon marketlerini zorlama.",
                  "",
                  "MATCH:",
                  f"{sm_home} vs {sm_away}",
                  "",
                  "PREMATCH:",
                  f"- xG ev: {xg_h}",
                  f"- xG deplasman: {xg_a}",
                  f"- odds 1: {odds_1}",
                  f"- odds X: {odds_x}",
                  f"- odds 2: {odds_2}",
                  f"- home_ppg: {ppg_h}",
                  f"- away_ppg: {ppg_a}",
                  f"- btts_potential: {btts}",
                  f"- over25_potential: {over25}",
                  "",
                  "LIVE:",
                  f"- state: {state_name}",
                  f"- minute: {minute}",
                  f"- score: {h_score}-{a_score}",
                  f"- stats_summary: {matched['live_stats_summary']}",
                  "",
                  "WEIGHTS:",
                  f"- prematch_weight: {prematch_weight}",
                  f"- live_weight: {live_weight}",
                  "",
                  "ALLOWED_DECISIONS:",
                  json.dumps(allowed, ensure_ascii=False)
              ])

              default_payload = {
                  "status_summary": "Veri çelişkili veya eksik olduğu için pas geçildi.",
                  "final_decision": "PAS GEÇ",
                  "bankroll_percent": 0,
                  "risk_score": 9,
                  "confidence": 20,
                  "reason_codes": ["LOW_DATA"]
              }

              payload = default_payload
              try:
                  response = client.models.generate_content(
                      model='gemini-2.5-flash',
                      contents=prompt,
                      config={
                          "response_mime_type": "application/json",
                          "response_json_schema": schema,
                      },
                  )
                  parsed = json.loads(response.text)
                  if parsed.get('final_decision') not in allowed:
                      parsed = default_payload
                      parsed['status_summary'] = 'Model izinli menü dışına çıktı; karar reddedildi.'
                      parsed['reason_codes'] = ['CONFLICT']
                  payload = parsed
              except Exception as ai_e:
                  print(f"AI işlem hatası: {ai_e}")

              matched['boss_ai_decision'] = format_decision(payload)
              print(f"✅ {sm_home} {h_score}-{a_score} {sm_away} -> eşleşme oranı {ratio:.2f}")
              time.sleep(1)

          today_path.write_text(json.dumps({"data": fs_data}, ensure_ascii=False, indent=2), encoding='utf-8')
          live_path.write_text(json.dumps(live_payload, ensure_ascii=False, indent=2), encoding='utf-8')
          print("✅ data/today.json ve data/live.json güncellendi.")
          PYEOF
          python3 /tmp/live_radar.py

      - name: Push Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Commander"
          git pull --rebase || true
          git add data/today.json data/live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Live: skorlar ve AI kararları güncellendi" && git push)
