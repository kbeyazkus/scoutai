name: ScoutAI LIVE Radar (Hybrid)
on:
  schedule:
    - cron: '*/10 * * * *' # Kota dostu: 10 dakikada bir çalışır
  workflow_dispatch:
jobs:
  live_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Live Hybrid Boss AI Decision
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests
          from google import genai

          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']
          client = genai.Client(vertexai=True, project=project_id, location="us-central1")

          print("📡 HİBRİT RADAR: RapidAPI'den Canlı Maçlar Çekiliyor...")
          
          # 1. RapidAPI (API-Football) SADECE CANLI MAÇLAR
          url = "https://api-football-v1.p.rapidapi.com/v3/fixtures"
          querystring = {"live": "all"}
          headers = {
              "X-RapidAPI-Key": os.environ['RAPIDAPI_KEY'],
              "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
          }
          
          try:
              req = requests.get(url, headers=headers, params=querystring)
              api_live_data = req.json().get('response', [])
          except Exception as e:
              print("❌ RapidAPI Bağlantı Hatası:", e)
              exit(0)
              
          if not api_live_data:
              print("RapidAPI: Şu an dünyada oynanan canlı maç yok. Radar beklemede.")
              exit(0)
              
          print(f"🔥 RapidAPI {len(api_live_data)} canlı maç bildirdi. FootyStats verileriyle eşleştiriliyor...")

          # 2. FootyStats Verilerini (today.json) Oku
          try:
              with open('data/today.json', 'r') as f:
                  existing_data = json.load(f).get('data', [])
          except:
              print("⚠️ today.json bulunamadı. Lütfen önce ana fetch.yml dosyasını çalıştırın.")
              exit(0)

          # İsim eşleştirme filtresi (API'ler arası isim farklarını düzeltir)
          def clean_name(n):
              return str(n).lower().replace(' fc', '').replace(' team', '').replace(' cf', '').replace(' united', '').strip()

          def match_teams(fs_h, fs_a, api_h, api_a):
              fh, fa = clean_name(fs_h), clean_name(fs_a)
              ah, aa = clean_name(api_h), clean_name(api_a)
              if (fh in ah or ah in fh) and (fa in aa or aa in fa):
                  return True
              return False

          matched_live_games = []
          
          for api_m in api_live_data:
              api_h = api_m['teams']['home']['name']
              api_a = api_m['teams']['away']['name']
              
              # existing_data (FootyStats) içinde bu maçı bul
              for em in existing_data:
                  fs_h = em.get('home_name', '')
                  fs_a = em.get('away_name', '')
                  
                  if match_teams(fs_h, fs_a, api_h, api_a):
                      em['live_score_h'] = api_m['goals']['home']
                      em['live_score_a'] = api_m['goals']['away']
                      em['live_elapsed'] = api_m['fixture']['status']['elapsed']
                      matched_live_games.append(em)
                      break

          if not matched_live_games:
              print("Sahada canlı maçlar var ancak bizim FootyStats (today.json) listemizle eşleşen DEV MAÇ bulunamadı.")
              exit(0)

          print(f"🎯 {len(matched_live_games)} HEDEF MAÇ Eşleşti! Boss AI Operasyona Başlıyor...")

          def live_boss_command(m):
              h, a = m.get("home_name", "N/A"), m.get("away_name", "N/A")
              dakika = m.get("live_elapsed", "Canlı")
              skor = f"{m.get('live_score_h', 0)} - {m.get('live_score_a', 0)}"
              
              prompt = f"""
              SEN 'BOSS AI' LİDERİSİN. ŞU AN OYNANAN CANLI BİR MAÇA MÜDAHALE EDİYORSUN!
              MAÇ: {h} vs {a} | DAKİKA: {dakika}' | GÜNCEL SKOR: {skor}
              
              Maç Öncesi İstihbarat (FootyStats): 
              - xG: Ev {m.get('team_a_xg_prematch', 0)} - Depl {m.get('team_b_xg_prematch', 0)}
              - Oranlar: 1:{m.get('odds_ft_1')} | X:{m.get('odds_ft_x')} | 2:{m.get('odds_ft_2')}
              
              GÖREV: FootyStats beklentisi (xG/Oran) ile şu anki canlı skoru/dakikayı çarpıştır. Acil bir canlı bahis fırsatı (Sıradaki Gol, Çifte Şans, Alt/Üst) varsa NET BİR EMİR VER. Tuzaksa PAS GEÇ.
              FORMAT: 🔴 CANLI ANALİZ | ⚡ ACİL EMİR | 💰 KASA | ⚠️ RİSK
              """
              try:
                  response = client.models.generate_content(model='gemini-2.5-flash', contents=prompt)
                  return response.text
              except: return None

          for lm in matched_live_games[:15]: 
              print(f"Boss AI Analiz Ediyor: {lm.get('home_name')} ({lm.get('live_score_h')}-{lm.get('live_score_a')})")
              decision = live_boss_command(lm)
              if decision:
                  lm['boss_ai_decision'] = decision
                  lm['status'] = 'live'
                  lm['homeGoalCount'] = lm.get('live_score_h')
                  lm['awayGoalCount'] = lm.get('live_score_a')
                  lm['elapsed'] = lm.get('live_elapsed')
              time.sleep(1)

          with open('data/today.json', 'w') as f:
              json.dump({"data": existing_data}, f, indent=2)
          PYEOF

      - name: Push Hybrid Live Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Hybrid Agent"
          git pull --rebase || true
          git add data/
          git commit -m "🔴 Canlı Hibrit Radar: RapidAPI Skoru + FootyStats Verisi Birleşti" || true
          git push || true
