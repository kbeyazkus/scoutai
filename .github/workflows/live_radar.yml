name: ScoutAI LIVE Radar (In-Play)
on:
  schedule:
    - cron: '*/2 * * * *' # 2 dakikada bir çalışır
  workflow_dispatch:
jobs:
  live_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Live Boss AI Decision
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests
          from google import genai

          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']
          client = genai.Client(vertexai=True, project=project_id, location="us-central1")

          print("📡 CANLI RADAR: Sahadaki aktif maçlar aranıyor...")
          f_url = "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats,odds"
          all_matches = requests.get(f_url).json().get('data', [])

          # SADECE CANLI MAÇLARI FİLTRELE
          live_matches = [m for m in all_matches if str(m.get('status', '')).lower() in ['live', 'in_progress', 'incomplete']]
          
          if not live_matches:
              print("Şu an oynanan canlı maç yok. Radar beklemede.")
              exit(0)

          print(f"🔥 {len(live_matches)} CANLI maç tespit edildi. Boss AI uyanıyor...")

          def live_boss_command(m):
              h, a = m.get("home_name", "N/A"), m.get("away_name", "N/A")
              dakika = m.get("elapsed", "Bilinmiyor")
              skor = f"{m.get('homeGoalCount', 0)} - {m.get('awayGoalCount', 0)}"
              
              prompt = f"""
              SEN 'BOSS AI' LİDERİSİN. ŞU AN OYNANAN CANLI BİR MAÇA MÜDAHALE EDİYORSUN!
              
              MAÇ: {h} vs {a} 
              DURUM: CANLI | DAKİKA: {dakika}' | GÜNCEL SKOR: {skor}
              
              İSTİHBARAT (Maç Öncesi Beklenti):
              - xG: Ev {m.get('team_a_xg_prematch', 0)} - Depl {m.get('team_b_xg_prematch', 0)}
              - Oranlar: 1:{m.get('odds_ft_1')} | X:{m.get('odds_ft_x')} | 2:{m.get('odds_ft_2')}

              GÖREVİN:
              Maçın şu anki skorunu, dakikasını ve maç öncesi xG beklentisini karşılaştır. 
              Örnek: "Favori takım (yüksek xG) geriye düşmüşse, 'Sıradaki Golü Atar' veya '1.5 Üst' fırsatı olabilir."
              Acil bir CANLI BAHİS emri ver veya "İzlemeye Devam Et (PAS GEÇ)" de.

              FORMAT: 🔴 CANLI ANALİZ | ⚡ ACİL EMİR | 💰 KASA | ⚠️ RİSK
              """
              try:
                  response = client.models.generate_content(model='gemini-2.5-flash', contents=prompt)
                  return response.text
              except: return None

          # Mevcut today.json dosyasını aç (bozmamak için)
          try:
              with open('data/today.json', 'r') as f:
                  existing_data = json.load(f).get('data', [])
          except:
              existing_data = []

          # Canlı analizleri mevcut verinin üzerine yaz
          for lm in live_matches[:10]: # En önemli 10 canlı maç
              print(f"Boss AI CANLI İzliyor: {lm.get('home_name')} (Skor: {lm.get('homeGoalCount')}-{lm.get('awayGoalCount')})")
              decision = live_boss_command(lm)
              if decision:
                  # Eski listede bu maçı bul ve güncelle
                  for existing_m in existing_data:
                      if existing_m.get('id') == lm.get('id'):
                          existing_m['boss_ai_decision'] = decision
                          existing_m['status'] = 'live'
                          existing_m['homeGoalCount'] = lm.get('homeGoalCount')
                          existing_m['awayGoalCount'] = lm.get('awayGoalCount')
                          existing_m['elapsed'] = lm.get('elapsed')
                          break
              time.sleep(1)

          with open('data/today.json', 'w') as f:
              json.dump({"data": existing_data}, f, indent=2)
          PYEOF

      - name: Push Live Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Live Agent"
          git pull --rebase || true
          git add data/
          git commit -m "🔴 Canlı Radar: Boss AI Güncel Skorlara Müdahale Etti" || true
          git push || true
