name: ScoutAI LIVE Radar (In-Play)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  live_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Live Boss AI Decision
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests
          from google import genai

          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']
          client = genai.Client(vertexai=True, project=project_id, location="us-central1")

          print("📡 CANLI RADAR: X-RAY (TEŞHİS) MODU AKTİF...")
          f_url = "https://api.football-data-api.com/todays-matches?key=efd2daca876472203f17e188a3c0ff47ac218829ddc1be362903d96d68205a3e&include=stats,odds"
          
          try:
              req = requests.get(f_url)
              response_json = req.json()
              all_matches = response_json.get('data', [])
              print(f"📥 API'den Toplam {len(all_matches)} maç çekildi.")
              
              if not all_matches:
                  print("⚠️ DİKKAT: API'den 0 maç geldi! API Kotası dolmuş veya bağlantı reddedilmiş olabilir.")
                  print(f"API Yanıtı: {response_json}")
                  exit(0)
          except Exception as e:
              print(f"❌ API Bağlantı Hatası: {e}")
              exit(0)

          current_time = time.time()
          print(f"⏱️ Sistem Saati (Unix): {int(current_time)}")

          live_matches = []
          
          for m in all_matches:
              date_unix = int(m.get('date_unix', 0))
              st = str(m.get('status', '')).lower()
              h_name = str(m.get('home_name', '')).lower()
              a_name = str(m.get('away_name', '')).lower()
              
              # 🕵️‍♂️ ÖZEL HEDEF TAKİBİ: Eğer dev maçlar varsa durumunu loga yazdır
              if "madrid" in h_name or "madrid" in a_name or "chelsea" in h_name or "chelsea" in a_name or "psg" in h_name or "psg" in a_name:
                  gecen_dakika = int((current_time - date_unix)/60) if date_unix > 0 else 0
                  print(f"🔍 X-RAY -> {m.get('home_name')} vs {m.get('away_name')} | Status: {st} | Geçen Süre: {gecen_dakika} dk")

              is_started = current_time >= date_unix
              is_not_too_old = current_time <= (date_unix + 9000) # 150 dk tolerans
              is_not_finished = st not in ['complete', 'canceled', 'postponed', 'suspended', 'finished', 'ft', 'abandoned', 'aet', 'pen']
              
              if ('live' in st or 'progress' in st) or (is_started and is_not_too_old and is_not_finished):
                  live_matches.append(m)
          
          if not live_matches:
              print("Şu an oynanan canlı maç yok. Radar beklemede.")
              exit(0)

          print(f"🔥 {len(live_matches)} GERÇEK CANLI maç tespit edildi! Boss AI uyanıyor...")

          def live_boss_command(m):
              h, a = m.get("home_name", "N/A"), m.get("away_name", "N/A")
              prompt = f"""SEN 'BOSS AI' LİDERİSİN. CANLI MAÇA MÜDAHALE ET: {h} vs {a}. FORMAT: 🔴 CANLI ANALİZ | ⚡ ACİL EMİR"""
              try:
                  return client.models.generate_content(model='gemini-2.5-flash', contents=prompt).text
              except: return None

          try:
              with open('data/today.json', 'r') as f:
                  existing_data = json.load(f).get('data', [])
          except: existing_data = []

          for lm in live_matches[:15]: 
              print(f"Boss AI CANLI Gözetliyor: {lm.get('home_name')}")
              decision = live_boss_command(lm)
              if decision:
                  for existing_m in existing_data:
                      if existing_m.get('id') == lm.get('id'):
                          existing_m['boss_ai_decision'] = decision
                          existing_m['status'] = 'live'
                          break
              time.sleep(1)

          with open('data/today.json', 'w') as f:
              json.dump({"data": existing_data}, f, indent=2)
          PYEOF

      - name: Push Live Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Live Agent"
          git pull --rebase || true
          git add data/
          git commit -m "🔴 Canlı Radar: Teşhis Modu Aktif" || true
          git push || true
