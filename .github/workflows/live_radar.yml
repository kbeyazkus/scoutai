name: ScoutAI Sportmonks Radar (Fixed)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  live_mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests unidecode google-genai

      - name: Execute Sportmonks Live Radar
        env:
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
        run: python3 scripts/live_radar.py

      - name: Push Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Commander"
          git pull --rebase || true
          git add data/today.json data/live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Live: skorlar ve AI kararlari guncellendi" && git push)
