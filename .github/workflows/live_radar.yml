name: ScoutAI LIVE Radar (Hybrid)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  live_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Live Hybrid Boss AI Decision
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests, re
          from google import genai

          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']
          client = genai.Client(vertexai=True, project=project_id, location="us-central1")

          url = "https://api-football-v1.p.rapidapi.com/v3/fixtures"
          querystring = {"live": "all"}
          headers = {
              "X-RapidAPI-Key": os.environ['RAPIDAPI_KEY'],
              "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
          }
          
          try:
              api_live_data = requests.get(url, headers=headers, params=querystring).json().get('response', [])
          except:
              exit(0)

          try:
              with open('data/today.json', 'r') as f:
                  existing_data = json.load(f).get('data', [])
          except:
              exit(0)

          # Gelişmiş İsim Eşleştirme Filtresi
          def simplify(name):
              name = re.sub(r'[^a-zA-Z]', '', str(name).lower())
              for w in ['fc','cf','united','city','club','deportivo','sporting']: 
                  name = name.replace(w, '')
              return name[:6]

          def match_teams(fs_h, fs_a, api_h, api_a):
              sh1, sh2 = simplify(fs_h), simplify(api_h)
              sa1, sa2 = simplify(fs_a), simplify(api_a)
              return (sh1 in sh2 or sh2 in sh1) and (sa1 in sa2 or sa2 in sa1)

          matched_live_games = []
          
          for api_m in api_live_data:
              api_h = api_m.get('teams', {}).get('home', {}).get('name', '')
              api_a = api_m.get('teams', {}).get('away', {}).get('name', '')
              
              h_g = api_m.get('goals', {}).get('home')
              a_g = api_m.get('goals', {}).get('away')
              h_g = 0 if h_g is None else int(h_g)
              a_g = 0 if a_g is None else int(a_g)
              elapsed = str(api_m.get('fixture', {}).get('status', {}).get('elapsed', 'Live'))
              
              for em in existing_data:
                  fs_h = em.get('home_name', '')
                  fs_a = em.get('away_name', '')
                  
                  if match_teams(fs_h, fs_a, api_h, api_a):
                      em['homeGoalCount'] = h_g
                      em['awayGoalCount'] = a_g
                      em['elapsed'] = elapsed
                      em['status'] = 'live'
                      matched_live_games.append(em)
                      break

          if not matched_live_games:
              # Skorlar eşleşmediyse mevcut veriyi koru
              with open('data/today.json', 'w') as f:
                  json.dump({"data": existing_data}, f, indent=2)
              exit(0)

          def live_boss_command(m):
              h, a = m.get("home_name", ""), m.get("away_name", "")
              dakika = m.get("elapsed", "")
              skor = f"{m.get('homeGoalCount', 0)} - {m.get('awayGoalCount', 0)}"
              prompt = f"BOSS AI. CANLI MAÇ: {h} vs {a} | DAKİKA: {dakika}' | SKOR: {skor}. Ön maç xG: Ev {m.get('team_a_xg_prematch',0)} - Depl {m.get('team_b_xg_prematch',0)}. FORMAT: 🔴 CANLI ANALİZ | ⚡ ACİL EMİR"
              try:
                  return client.models.generate_content(model='gemini-2.5-flash', contents=prompt).text
              except: return None

          for lm in matched_live_games[:15]: 
              decision = live_boss_command(lm)
              if decision:
                  lm['boss_ai_decision'] = decision
              time.sleep(1)

          with open('data/today.json', 'w') as f:
              json.dump({"data": existing_data}, f, indent=2)
          PYEOF

      - name: Push Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI"
          git pull --rebase || true
          git add data/
          git commit -m "Canlı Radar İsim Eşleştirme Düzeltildi" || true
          git push || true
