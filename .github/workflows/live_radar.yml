name: ScoutAI LIVE Radar (Hybrid)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  live_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install dependencies
        run: pip install requests google-genai

      - name: Live Hybrid Boss AI Decision
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, requests
          from google import genai

          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
              project_id = info['project_id']
          client = genai.Client(vertexai=True, project=project_id, location="us-central1")

          print("📡 HİBRİT RADAR: RapidAPI Canlı Skorlar Çekiliyor...")
          
          url = "https://api-football-v1.p.rapidapi.com/v3/fixtures"
          querystring = {"live": "all"}
          headers = {
              "X-RapidAPI-Key": os.environ['RAPIDAPI_KEY'],
              "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"
          }
          
          try:
              req = requests.get(url, headers=headers, params=querystring)
              api_live_data = req.json().get('response', [])
          except:
              print("❌ RapidAPI Bağlantı Hatası!")
              exit(0)
              
          if not api_live_data:
              print("Şu an RapidAPI'de canlı maç yok.")
              exit(0)

          try:
              with open('data/today.json', 'r') as f:
                  existing_data = json.load(f).get('data', [])
          except:
              exit(0)

          def clean_name(n):
              return str(n).lower().replace(' fc', '').replace(' team', '').replace(' cf', '').replace(' united', '').replace(' city', '').strip()

          def match_teams(fs_h, fs_a, api_h, api_a):
              fh, fa = clean_name(fs_h), clean_name(fs_a)
              ah, aa = clean_name(api_h), clean_name(api_a)
              return (fh in ah or ah in fh) and (fa in aa or aa in fa)

          matched_live_games = []
          
          for api_m in api_live_data:
              api_h = str(api_m.get('teams', {}).get('home', {}).get('name', ''))
              api_a = str(api_m.get('teams', {}).get('away', {}).get('name', ''))
              
              # 🎯 Skorları güvenli çek (Null gelirse 0 yap)
              h_g = api_m.get('goals', {}).get('home')
              a_g = api_m.get('goals', {}).get('away')
              h_g = 0 if h_g is None else int(h_g)
              a_g = 0 if a_g is None else int(a_g)
              elapsed = str(api_m.get('fixture', {}).get('status', {}).get('elapsed', 'Live'))
              
              for em in existing_data:
                  fs_h = str(em.get('home_name', ''))
                  fs_a = str(em.get('away_name', ''))
                  
                  if match_teams(fs_h, fs_a, api_h, api_a):
                      # ⚡ KRİTİK DÜZELTME: Skorları Boss AI'yi beklemeden ANINDA DOSYAYA YAZ!
                      em['homeGoalCount'] = h_g
                      em['awayGoalCount'] = a_g
                      em['elapsed'] = elapsed
                      em['status'] = 'live'
                      
                      matched_live_games.append(em)
                      break

          if not matched_live_games:
              print("Canlı maç var ama veritabanımızdakilerle eşleşmedi.")
              # Skorlar güncellendiği kadarıyla dosyayı yine de kaydet (Eşleşen varsa diye)
              with open('data/today.json', 'w') as f:
                  json.dump({"data": existing_data}, f, indent=2)
              exit(0)

          print(f"🎯 {len(matched_live_games)} Maçın skoru ANINDA güncellendi! Şimdi AI analizi başlıyor...")

          def live_boss_command(m):
              h, a = m.get("home_name", "N/A"), m.get("away_name", "N/A")
              dakika = m.get("elapsed", "Canlı")
              skor = f"{m.get('homeGoalCount', 0)} - {m.get('awayGoalCount', 0)}"
              
              prompt = f"""SEN 'BOSS AI' LİDERİSİN. CANLI MAÇA MÜDAHALE ET: {h} vs {a} | DAKİKA: {dakika}' | SKOR: {skor}. Maç öncesi xG: Ev {m.get('team_a_xg_prematch',0)} - Depl {m.get('team_b_xg_prematch',0)}. FORMAT: 🔴 CANLI ANALİZ | ⚡ ACİL EMİR"""
              try:
                  return client.models.generate_content(model='gemini-2.5-flash', contents=prompt).text
              except: return None

          for lm in matched_live_games[:15]: 
              decision = live_boss_command(lm)
              if decision:
                  lm['boss_ai_decision'] = decision
              time.sleep(1)

          # Tüm işlemleri (skorlar + AI yorumları) en son dosyaya kalıcı yaz
          with open('data/today.json', 'w') as f:
              json.dump({"data": existing_data}, f, indent=2)
          PYEOF

      - name: Push Live Updates
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Hybrid Agent"
          git pull --rebase || true
          git add data/
          git commit -m "🔴 Canlı Radar: 5-0 Skor Gecikmesi Fixlendi" || true
          git push || true
