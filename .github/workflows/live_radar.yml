name: ScoutAI Live Radar

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: scoutai-data
  cancel-in-progress: false

jobs:
  live-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests unidecode google-genai

      - name: Run live radar
        env:
          SPORTMONKS_KEY: ${{ secrets.SPORTMONKS_KEY }}
          GEMINI_MODEL: "gemini-2.5-flash"
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_LOCATION: "us-central1"
        run: python scripts/live_radar.py

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI Bot"
          git pull --rebase || true
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update live radar [skip ci]" && git push)
