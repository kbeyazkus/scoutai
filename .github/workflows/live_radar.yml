name: ScoutAI LIVE Radar (Final Fix)
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  live_analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
      - name: Install dependencies
        run: pip install requests google-genai
      - name: Force Update Scores
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, requests, time, re
          from google import genai

          # 1. RapidAPI'den GERÇEK CANLI Skorları Al
          url = "https://api-football-v1.p.rapidapi.com/v3/fixtures?live=all"
          headers = {"X-RapidAPI-Key": os.environ['RAPIDAPI_KEY'], "X-RapidAPI-Host": "api-football-v1.p.rapidapi.com"}
          try:
              rapid_res = requests.get(url, headers=headers).json().get('response', [])
          except: exit(0)

          # 2. FootyStats Dosyasını (today.json) Oku
          try:
              with open('data/today.json', 'r') as f:
                  fs_json = json.load(f)
                  fs_data = fs_json.get('data', [])
          except: exit(0)

          def simplify(n):
              n = re.sub(r'[^a-zA-Z]', '', str(n).lower())
              for w in ['fc','cf','united','city','club','real']: n = n.replace(w, '')
              return n[:5]

          # 3. Skorları Zorla Güncelle (Zırhlı Eşleştirme)
          matched_count = 0
          for rm in rapid_res:
              rh = simplify(rm['teams']['home']['name'])
              ra = simplify(rm['teams']['away']['name'])
              hg = rm['goals']['home']
              ag = rm['goals']['away']
              el = rm['fixture']['status']['elapsed']
              
              for em in fs_data:
                  fh = simplify(em.get('home_name',''))
                  fa = simplify(em.get('away_name',''))
                  if (rh in fh or fh in rh) and (ra in fa or fa in ra):
                      em['homeGoalCount'] = hg if hg is not None else 0
                      em['awayGoalCount'] = ag if ag is not None else 0
                      em['elapsed'] = el
                      em['status'] = 'live'
                      matched_count += 1
                      break

          print(f"✅ {matched_count} maçın skoru RapidAPI ile zorla güncellendi.")

          # 4. Boss AI Analizi
          with open(os.environ['GOOGLE_APPLICATION_CREDENTIALS']) as f:
              info = json.load(f)
          client = genai.Client(vertexai=True, project=info['project_id'], location="us-central1")

          for m in fs_data:
              if m.get('status') == 'live' and not m.get('boss_ai_decision'):
                  prompt = f"BOSS AI: {m['home_name']} {m['homeGoalCount']}-{m['awayGoalCount']} {m['away_name']} (Dk:{m['elapsed']}). xG:{m.get('team_a_xg_prematch',0)}-{m.get('team_b_xg_prematch',0)}. CANLI ANALİZ/EMİR VER."
                  try:
                      res = client.models.generate_content(model='gemini-2.5-flash', contents=prompt)
                      m['boss_ai_decision'] = res.text
                      time.sleep(1)
                  except: pass

          with open('data/today.json', 'w') as f:
              json.dump({"data": fs_data}, f, indent=2)
          PYEOF
      - name: Push
        run: |
          git config user.email "action@github.com"
          git config user.name "ScoutAI"
          git pull --rebase || true
          git add data/
          git commit -m "🔴 Skorlar RapidAPI ile Senkronize Edildi" || true
          git push || true
