<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ScoutAI Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#111118;--bg3:#18181f;--card:#1c1c25;--border:#2a2a38;--accent:#00e5a0;--purple:#7c5cfc;--red:#ff4d6d;--gold:#ffd166;--text:#e8e8f0;--muted:#6060a0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;overflow:hidden}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px}
.logo{font-size:19px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#ref-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;padding:5px 11px;cursor:pointer;display:flex;align-items:center;gap:5px}
#cd{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent)}

/* TABS */
#tabs{position:fixed;top:52px;left:0;right:0;z-index:99;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:13px;font-weight:600;letter-spacing:.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}

/* SUB TABS */
#subtabs{position:fixed;top:96px;left:0;right:0;z-index:98;background:var(--bg3);border-bottom:1px solid var(--border);display:none;overflow-x:auto;scrollbar-width:none;padding:0 8px}
#subtabs::-webkit-scrollbar{display:none}
#subtabs.show{display:flex}
.stab{flex-shrink:0;padding:8px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.stab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* CONTENT */
#content{position:fixed;top:96px;left:0;right:0;bottom:60px;overflow-y:auto;padding:10px 12px}
#content.withsub{top:132px}

/* FAB */
#fab{position:fixed;bottom:0;left:0;right:0;z-index:100;height:60px;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px}
#fab-info{font-size:13px;color:var(--muted)}
#fab-info b{color:var(--accent)}
#fab-open{background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:10px;padding:9px 18px;color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;cursor:pointer}

/* SECTION HEAD */
.sh{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);padding:14px 2px 7px;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:var(--border)}

/* MATCH CARD */
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}
.mc.super{border-color:rgba(255,100,50,.5)}
.mc.banko{border-color:rgba(0,229,160,.4)}

.mc-top{padding:8px 12px 4px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.lg-badge{font-size:11px;color:var(--muted);flex:1}
.mc-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-right:3px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.live-lbl{font-size:11px;color:var(--red);font-weight:700}

/* SCORE ROW */
.mc-score{padding:4px 12px 6px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team-block{display:flex;flex-direction:column;align-items:center;gap:4px}
.team-block.h{align-items:flex-start}
.team-block.a{align-items:flex-end}
.team-logo{width:32px;height:32px;border-radius:6px;object-fit:contain;background:var(--bg3);padding:2px}
.team-logo-placeholder{width:32px;height:32px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:16px}
.team-name{font-size:13px;font-weight:600;line-height:1.2;text-align:center}
.team-block.h .team-name{text-align:left}
.team-block.a .team-name{text-align:right}
.score-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:center;font-family:'DM Mono',monospace;font-size:20px;font-weight:500;min-width:70px}
.score-box.live{border-color:var(--red);color:var(--red)}

/* FORM */
.mc-form{padding:2px 12px 6px;display:flex;justify-content:space-between}
.fp{display:flex;gap:2px}
.fc{width:18px;height:18px;border-radius:3px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fc.W{background:rgba(0,229,160,.15);color:var(--accent)}
.fc.D{background:rgba(255,209,102,.15);color:var(--gold)}
.fc.L{background:rgba(255,77,109,.15);color:var(--red)}

/* STATS */
.mc-stats{padding:4px 12px 8px;display:grid;grid-template-columns:repeat(4,1fr);gap:3px;border-top:1px solid var(--border)}
.si{text-align:center}
.sl{font-size:9px;color:var(--muted)}
.sv{font-family:'DM Mono',monospace;font-size:11px;color:var(--text)}

/* SCORE BAR */
.mc-score-bar{padding:6px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px}
.score-num{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;min-width:36px;text-align:center}
.score-label{font-size:10px;color:var(--muted);letter-spacing:.5px}
.score-bar-wrap{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.fill-super{background:linear-gradient(90deg,#ff6432,#ff4d6d)}
.fill-banko{background:linear-gradient(90deg,var(--accent),#00b87a)}
.fill-risk{background:var(--border)}

/* BOTTOM */
.mc-bot{border-top:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;letter-spacing:.3px;padding:3px 7px;border-radius:5px}
.b-super{background:rgba(255,100,50,.2);color:#ff6432;border:1px solid rgba(255,100,50,.4)}
.b-banko{background:rgba(0,229,160,.15);color:var(--accent);border:1px solid rgba(0,229,160,.3)}
.b-risk{background:rgba(255,77,109,.1);color:var(--red);border:1px solid rgba(255,77,109,.2)}
.suggest{font-size:11px;color:var(--gold);font-weight:600;padding:3px 7px;background:rgba(255,209,102,.1);border-radius:5px;border:1px solid rgba(255,209,102,.2)}
.bbet{display:flex;gap:4px}
.bb{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 9px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.bb.s1{background:rgba(0,229,160,.2);border-color:var(--accent);color:var(--accent)}
.bb.sx{background:rgba(255,209,102,.2);border-color:var(--gold);color:var(--gold)}
.bb.s2{background:rgba(124,92,252,.2);border-color:var(--purple);color:var(--purple)}

/* SYSTEM TAGS */
.sys-tags{padding:4px 12px 6px;display:flex;gap:4px;flex-wrap:wrap}
.sys-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.3px}
.st-xg{background:rgba(124,92,252,.15);color:var(--purple)}
.st-ht{background:rgba(0,229,160,.12);color:var(--accent)}
.st-iy{background:rgba(255,209,102,.12);color:var(--gold)}
.st-ov{background:rgba(255,100,50,.12);color:#ff6432}
.st-card{background:rgba(255,77,109,.12);color:var(--red)}
.st-daily{background:rgba(100,200,255,.12);color:#64c8ff}
.st-mls{background:rgba(200,100,255,.12);color:#c864ff}

/* LOADING / EMPTY / ERROR */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:12px}
.spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:13px;color:var(--muted)}
.empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;line-height:2}
.err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:10px;padding:14px;margin-bottom:10px;font-size:13px;color:var(--red);line-height:1.5}

/* KUPON MODAL */
#kmod{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);display:none;align-items:flex-end}
#kmod.on{display:flex}
#kmod-in{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:75vh;overflow-y:auto;padding:18px 14px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mt{font-size:18px;font-weight:700}
.mx{background:var(--border);border:none;border-radius:50%;width:28px;height:28px;color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mrow{padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px}
.mrow:last-child{border-bottom:none}
.mpick{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px}
.p1{background:rgba(0,229,160,.2);color:var(--accent)}
.px{background:rgba(255,209,102,.2);color:var(--gold)}
.p2{background:rgba(124,92,252,.2);color:var(--purple)}
.msave{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:12px;padding:13px;color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;cursor:pointer}
.mclr{width:100%;margin-top:7px;background:none;border:1px solid var(--border);border-radius:12px;padding:11px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;cursor:pointer}

/* SAVED KUPONS */
.kcard{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.khead{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.kdate{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.krow{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px}
.kdel{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 8px;cursor:pointer;font-family:'Rajdhani',sans-serif;margin:6px 13px}
</style>
</head>
<body>

<div id="hdr">
  <div class="logo">⚡ SCOUTAI</div>
  <button id="ref-btn" onclick="doRefresh()">🔄 <span id="cd">30</span>s</button>
</div>

<div id="tabs">
  <div class="tab on"  onclick="go('live')">🔴 Canlı</div>
  <div class="tab"     onclick="go('today')">📅 Bugün</div>
  <div class="tab"     onclick="go('tomorrow')">📆 Yarın</div>
  <div class="tab"     onclick="go('super')">🔥 Süper</div>
  <div class="tab"     onclick="go('banko')">⭐ Banko</div>
  <div class="tab"     onclick="go('sistem')">🎯 Sistem</div>
  <div class="tab"     onclick="go('kupon')">🎫 Kupon</div>
</div>

<div id="subtabs">
  <div class="stab on"  onclick="setSub('iy')">🌅 İY Gol</div>
  <div class="stab"     onclick="setSub('ov25')">⚽ Üst 2.5</div>
  <div class="stab"     onclick="setSub('xg')">📊 Home xG</div>
  <div class="stab"     onclick="setSub('ht')">0-0 HT</div>
  <div class="stab"     onclick="setSub('card')">🟥 Kart</div>
  <div class="stab"     onclick="setSub('daily')">💰 Daily</div>
</div>

<div id="content">
  <div class="loading"><div class="spin"></div><div class="ltxt">Yükleniyor…</div></div>
</div>

<div id="fab">
  <div id="fab-info">Kupon: <b id="fc">0</b> maç</div>
  <button id="fab-open" onclick="openK()">🎫 Kuponu Gör</button>
</div>

<div id="kmod" onclick="outsideK(event)">
  <div id="kmod-in">
    <div class="mh">
      <div class="mt">🎫 Aktif Kupon</div>
      <button class="mx" onclick="closeK()">×</button>
    </div>
    <div id="mcontent"></div>
    <button class="msave" onclick="saveK()">💾 Kaydet</button>
    <button class="mclr"  onclick="clearK()">🗑 Temizle</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let cache   = {today:null, tomorrow:null};
let kupon   = {};
let saved   = JSON.parse(localStorage.getItem('sc_kup')||'[]');
let tab     = 'live';
let subTab  = 'iy';
let cdVal   = 30;
let cdTmr   = null;
const matchMap = {};

// ═══════════════════════════════════════════
//  VERİ
// ═══════════════════════════════════════════
async function fetchDay(offset) {
  const key  = offset===0 ? 'today' : 'tomorrow';
  if (cache[key]) return cache[key];
  const file = offset===0 ? 'data/today.json' : 'data/tomorrow.json';
  const r = await fetch(file+'?t='+Date.now());
  if (!r.ok) throw new Error('Veri yüklenemedi');
  const j = await r.json();
  cache[key] = Array.isArray(j.data) ? j.data : [];
  return cache[key];
}

// ═══════════════════════════════════════════
//  DURUM
// ═══════════════════════════════════════════
function isLive(m){ const s=String(m.status||'').toLowerCase(); return s==='inprogress'||s==='live'; }
function isDone(m){ const s=String(m.status||'').toLowerCase(); return s==='complete'; }
function isUpcoming(m){ return !isLive(m)&&!isDone(m); }

// ═══════════════════════════════════════════
//  FORM HESABI
// ═══════════════════════════════════════════
function formScore(str) {
  if (!str) return 0;
  return String(str).split('').slice(0,5).reduce((acc,c)=>acc+(c==='W'?3:c==='D'?1:0),0);
}
function formPills(str) {
  if (!str) return '';
  return String(str).split('').slice(0,5).map(c=>{
    const f=c==='W'?'W':c==='D'?'D':'L';
    return `<div class="fc ${f}">${f}</div>`;
  }).join('');
}

// ═══════════════════════════════════════════
//  GÜVEN SKORU & SİSTEM ANALİZİ
// ═══════════════════════════════════════════
function analyzeMatch(m) {
  const hPPG   = parseFloat(m.home_ppg)||0;
  const aPPG   = parseFloat(m.away_ppg)||0;
  const hXG    = parseFloat(m.team_a_xg)||0;
  const aXG    = parseFloat(m.team_b_xg)||0;
  const btts   = parseFloat(m.btts_potential)||0;
  const ov25   = parseFloat(m.over25_potential)||0;
  const ov05   = parseFloat(m.over05_potential)||100;
  const o05HT  = parseFloat(m.o05HT_potential)||0;
  const o15HT  = parseFloat(m.o15HT_potential)||0;
  const avgG   = parseFloat(m.avg_potential)||0;
  const cards  = parseFloat(m.cards_potential)||0;
  const hForm  = formScore(m.home_form);
  const aForm  = formScore(m.away_form);
  const hGames = parseInt(m.matches_completed_minimum)||0;
  const hHTG   = parseFloat(m.o05HT_potential)||0;

  // Minimum maç filtresi
  const enoughGames = hGames >= 8;

  let score = 0;
  const systems = [];
  let suggest = '';
  let suggestOdds = '';

  // PPG farkı
  const ppgDiff = Math.abs(hPPG - aPPG);
  if (ppgDiff >= 0.8) score += 20;
  else if (ppgDiff >= 0.5) score += 12;
  else if (ppgDiff >= 0.3) score += 6;

  // xG farkı
  const xgDiff = hXG - aXG;
  if (Math.abs(xgDiff) >= 0.5) score += 20;
  else if (Math.abs(xgDiff) >= 0.3) score += 12;
  else if (Math.abs(xgDiff) >= 0.15) score += 6;

  // Form
  if (hForm >= 9 || aForm >= 9) score += 15;
  else if (hForm >= 6 || aForm >= 6) score += 8;

  // Üst 2.5
  if (ov25 >= 70) score += 15;
  else if (ov25 >= 55) score += 8;

  // BTTS
  if (btts >= 65) score += 10;
  else if (btts >= 50) score += 5;

  // İY gol
  if (o05HT >= 70) score += 10;
  else if (o05HT >= 55) score += 5;

  // Berabere riski — düşür
  if (hPPG < 1.1 && aPPG < 1.1) score -= 20;
  else if (hPPG < 1.3 && aPPG < 1.3) score -= 10;

  // Yeterli maç yoksa düşür
  if (!enoughGames) score = Math.min(score, 50);

  score = Math.max(0, Math.min(100, score));

  // ── SİSTEM ETİKETLERİ ──

  // 1. Home xG
  if (hXG > aXG + 0.2 && enoughGames) {
    systems.push({key:'xg', label:'📊 Home xG'});
    if (!suggest) { suggest = hPPG > aPPG ? '1X oyna' : '1X oyna'; suggestOdds = '~1.4-1.7'; }
  }

  // 2. İY 0.5 Üst
  if (o05HT >= 65 && enoughGames) {
    systems.push({key:'iy', label:'🌅 İY Gol'});
    if (!suggest) { suggest = 'İY 0.5 Üst oyna'; suggestOdds = '~1.2-1.5'; }
  }

  // 3. Üst 2.5
  if (ov25 >= 60 && enoughGames) {
    systems.push({key:'ov25', label:'⚽ Üst 2.5'});
    if (!suggest) { suggest = 'Üst 2.5 oyna'; suggestOdds = '~1.6-2.0'; }
  }

  // 4. 0-0 HT (canlı maç, skor 0-0, avgG 2.5+)
  const hG = parseInt(m.homeGoalCount)||0;
  const aG = parseInt(m.awayGoalCount)||0;
  if (isLive(m) && hG===0 && aG===0 && avgG>=2.5 && hForm>=6 && aForm>=6) {
    systems.push({key:'ht', label:'⏱ 0-0 HT'});
    if (!suggest) { suggest = '2.Yarı Üst 1.5 oyna'; suggestOdds = '~1.5-2.0'; }
  }

  // 5. Kart sistemi
  if (cards >= 4.5 && enoughGames) {
    systems.push({key:'card', label:'🟥 Kart'});
    if (!suggest && score < 60) { suggest = 'Kart bahsi'; suggestOdds = '~1.8-2.2'; }
  }

  // 6. 5% Daily - Üst 0.5 gol, ov05 yüksek
  if (ov05 >= 95 && enoughGames) {
    systems.push({key:'daily', label:'💰 Daily'});
    if (!suggest) { suggest = 'Üst 0.5 oyna'; suggestOdds = '~1.05-1.15'; }
  }

  // Tahmin yönü
  if (!suggest) {
    if (hPPG > aPPG + 0.5) { suggest = '1 oyna'; suggestOdds = '~1.5-2.0'; }
    else if (aPPG > hPPG + 0.5) { suggest = '2 oyna'; suggestOdds = '~1.8-2.5'; }
    else { suggest = 'X riski var'; suggestOdds = ''; }
  }

  // Badge
  let badge, badgeCls, cardCls='';
  if (score >= 85) { badge='🔥 SÜPER BANKO'; badgeCls='b-super'; cardCls='super'; }
  else if (score >= 75) { badge='⭐ BANKO'; badgeCls='b-banko'; cardCls='banko'; }
  else { badge='❌ RİSKLİ'; badgeCls='b-risk'; }

  return {score, badge, badgeCls, cardCls, suggest, suggestOdds, systems, enoughGames};
}

// ═══════════════════════════════════════════
//  SİSTEM FİLTRELERİ
// ═══════════════════════════════════════════
function filterBySub(matches, sub) {
  return matches.filter(m => {
    const a = analyzeMatch(m);
    return a.systems.some(s => s.key === sub);
  });
}

// ═══════════════════════════════════════════
//  KART RENDER
// ═══════════════════════════════════════════
function fmtTime(ts) {
  if (!ts) return '--:--';
  return new Date(ts*1000).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'});
}

function teamLogo(url, name) {
  if (url && url.startsWith('http')) {
    return `<img class="team-logo" src="${url}" alt="${name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="team-logo-placeholder" style="display:none">⚽</div>`;
  }
  return `<div class="team-logo-placeholder">⚽</div>`;
}

function card(m) {
  matchMap[m.id] = m;
  const hN   = m.home_name||'?';
  const aN   = m.away_name||'?';
  const hImg = m.home_image||'';
  const aImg = m.away_image||'';
  const lg   = m.competition_name||'⚽';
