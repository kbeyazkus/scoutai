<style>

#fab-info{font-size:13px;color:var(--muted)}#fab-info b{color:var(--accent)}#fab-open{background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:10px;padding:9px 18px;color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.sh{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--muted);padding:14px 2px 7px;display:flex;align-items:center;gap:8px}.sh::after{content:'';flex:1;height:1px;background:var(--border)}
.mc{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden}.mc-top{padding:8px 12px 4px;display:flex;align-items:center;justify-content:space-between;gap:6px}.lg-badge{font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.mc-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap}.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);display:inline-block;margin-right:3px;animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}.live-lbl{font-size:11px;color:var(--red);font-weight:700}
.mc-teams{padding:6px 12px 4px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}.team-col{display:flex;flex-direction:column;align-items:center;gap:3px}.team-col.h{align-items:flex-start}.team-col.a{align-items:flex-end}.tlogo{width:34px;height:34px;border-radius:6px;object-fit:contain;background:var(--bg3);padding:2px}.tlogo-ph{width:34px;height:34px;border-radius:6px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}.tname{font-size:13px;font-weight:600;line-height:1.2;max-width:110px}.tname.h{text-align:left}.tname.a{text-align:right}.score-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center;font-family:'DM Mono',monospace;font-size:20px;min-width:68px}.score-box.live{border-color:var(--red);color:var(--red)}
.mc-odds{padding:3px 12px 5px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}.odd-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:4px 0;text-align:center;cursor:pointer;transition:all .15s}.odd-btn.s1{background:rgba(0,229,160,.2);border-color:var(--accent)}.odd-btn.sx{background:rgba(255,209,102,.2);border-color:var(--gold)}.odd-btn.s2{background:rgba(124,92,252,.2);border-color:var(--purple)}.odd-lbl{font-size:10px;color:var(--muted);letter-spacing:.3px}.odd-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--text)}.odd-btn.s1 .odd-val{color:var(--accent)}.odd-btn.sx .odd-val{color:var(--gold)}.odd-btn.s2 .odd-val{color:var(--purple)}
.mc-form{padding:2px 12px 5px;display:flex;justify-content:space-between}.fp{display:flex;gap:2px}.fc{width:17px;height:17px;border-radius:3px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}.fc.W{background:rgba(0,229,160,.15);color:var(--accent)}.fc.D{background:rgba(255,209,102,.15);color:var(--gold)}.fc.L{background:rgba(255,77,109,.15);color:var(--red)}
.mc-stats{padding:4px 12px 6px;display:grid;grid-template-columns:repeat(5,1fr);gap:2px;border-top:1px solid var(--border)}.si{text-align:center;padding:2px 0}.sl{font-size:9px;color:var(--muted)}.sv{font-family:'DM Mono',monospace;font-size:11px;color:var(--text)}.sv.hi{color:var(--accent)}.sv.med{color:var(--gold)}

.fm-group{margin-bottom:8px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}.fm-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;background:var(--bg3)}.fm-hdr-flag{font-size:16px;line-height:1}.fm-hdr-info{flex:1}.fm-hdr-league{font-size:13px;font-weight:700;color:var(--text)}.fm-hdr-count{font-size:11px;color:var(--muted)}.fm-match{display:grid;grid-template-columns:36px 1fr auto;align-items:center;padding:10px 14px;border-top:1px solid var(--border);background:var(--card);cursor:pointer;transition:background .1s;gap:8px}.fm-match:active{background:var(--bg3)}.fm-min{font-size:11px;font-weight:800;color:var(--red);text-align:center;line-height:1.2}.fm-min span{display:block;width:6px;height:6px;background:var(--red);border-radius:50%;margin:3px auto 0;animation:pulse 1s infinite}.fm-min.hy{color:var(--gold)}.fm-min.hy span{background:var(--gold);animation:none}.fm-teams{display:flex;flex-direction:column;gap:5px}.fm-team{display:flex;align-items:center;gap:8px}.fm-logo{width:20px;height:20px;object-fit:contain;flex-shrink:0}.fm-logo-ph{width:20px;height:20px;background:var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);font-weight:700;flex-shrink:0}.fm-name{font-size:14px;font-weight:600;color:var(--text)}.fm-name.win{color:var(--text);font-weight:800}.fm-name.lose{color:var(--muted)}.fm-scores{display:flex;flex-direction:column;gap:5px;align-items:flex-end}.fm-score{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;color:var(--text);line-height:1.4}.fm-score.win{color:var(--text)}.fm-score.lose{color:var(--muted)}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.mc-bot{border-top:1px solid var(--border);padding:6px 12px;display:flex;align-items:center;justify-content:flex-end}.anl-btn{background:linear-gradient(135deg,var(--purple),#5a3cc4);border:none;border-radius:7px;padding:5px 14px;color:#fff;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;letter-spacing:.5px}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:220px;gap:12px}.spin{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.ltxt{font-size:13px;color:var(--muted)}.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;line-height:2}.err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);border-radius:10px;padding:14px;margin-bottom:10px;font-size:13px;color:var(--red);line-height:1.6}
#amod{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);display:none;align-items:flex-end}#amod.on{display:flex}#amod-in{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:16px 14px 30px}.amod-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.amod-title{font-size:16px;font-weight:700}.amod-sub{font-size:11px;color:var(--accent);margin-top:2px}.asec{margin-bottom:16px}.asec-title{font-size:10px;font-weight:700;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}.asec-title::after{content:'';flex:1;height:1px;background:var(--border)}.cmp-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;padding:6px 8px;background:var(--card);border-radius:7px;margin-bottom:3px}.cv-h{font-family:'DM Mono',monospace;font-size:12px;font-weight:600}.cv-a{font-family:'DM Mono',monospace;font-size:12px;font-weight:600;text-align:right}.cv-l{font-size:9px;color:var(--muted);text-align:center}.cv-h.w{color:var(--accent)}.cv-a.w{color:var(--accent)}.stat-row{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--card);border-radius:7px;margin-bottom:3px}.stat-lbl{font-size:11px;color:var(--muted)}.stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700}.mx{background:var(--border);border:none;border-radius:50%;width:28px;height:28px;color:var(--text);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}.ai-box{background:linear-gradient(135deg,rgba(124,92,252,.1),rgba(0,229,160,.08));border:1px solid rgba(124,92,252,.3);border-radius:12px;padding:14px}.ai-txt{font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap}.kup-btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.kup-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px;color:var(--text);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .15s}.kup-btn.a1{background:rgba(0,229,160,.2);border-color:var(--accent);color:var(--accent)}.kup-btn.ax{background:rgba(255,209,102,.2);border-color:var(--gold);color:var(--gold)}.kup-btn.a2{background:rgba(124,92,252,.2);border-color:var(--purple);color:var(--purple)}
#kmod{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);display:none;align-items:flex-end}#kmod.on{display:flex}#kmod-in{background:var(--bg2);border-top:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-height:75vh;overflow-y:auto;padding:18px 14px}.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.mt{font-size:18px;font-weight:700}.mrow{padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;gap:8px}.mrow:last-child{border-bottom:none}.mpick{font-size:11px;font-weight:700;padding:2px 8px;border-radius:4px;white-space:nowrap}.p1{background:rgba(0,229,160,.2);color:var(--accent)}.px{background:rgba(255,209,102,.2);color:var(--gold)}.p2{background:rgba(124,92,252,.2);color:var(--purple)}.msave{width:100%;margin-top:14px;background:linear-gradient(135deg,var(--accent),var(--purple));border:none;border-radius:12px;padding:13px;color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:15px;cursor:pointer}.mclr{width:100%;margin-top:7px;background:none;border:1px solid var(--border);border-radius:12px;padding:11px;color:var(--muted);font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;cursor:pointer}.kcard{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}.khead{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.kdate{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}.krow2{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px}.kdel{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;padding:4px 8px;cursor:pointer;font-family:'Rajdhani',sans-serif;margin:6px 13px}
</style>

<body>
<div id="hdr"><div class="logo">⚡ SCOUTAI</div><button id="ref-btn" onclick="doRefresh()">🔄 <span id="cd">30</span>s</button></div>
<div id="tabs"><div class="tab on" onclick="go('live')">🔴 Canlı</div><div class="tab" onclick="go('today')">📅 Bugün</div><div class="tab" onclick="go('tomorrow')">📆 Yarın</div><div class="tab" onclick="go('super')">🔥 Süper</div><div class="tab" onclick="go('banko')">⭐ Banko</div><div class="tab" onclick="go('ust05')">⚡ Üst 0.5</div><div class="tab" onclick="go('kombin')">🎰 Kombinler</div><div class="tab" onclick="go('sistem')">🎯 Sistem</div><div class="tab" onclick="go('kupon')">🎫 Kupon</div></div>
<div id="subtabs"><div class="stab on" onclick="setSub('iy')">🌅 İY Gol</div><div class="stab" onclick="setSub('ov25')">⚽ Üst 2.5</div><div class="stab" onclick="setSub('xg')">📊 xG Ev</div><div class="stab" onclick="setSub('ht')">⏱ 0-0 HT</div><div class="stab" onclick="setSub('card')">🟥 Kart</div><div class="stab" onclick="setSub('daily')">💰 Daily</div><div class="stab" onclick="setSub('corner')">📐 Korner</div></div>
<div id="content"><div class="loading"><div class="spin"></div><div class="ltxt">Yükleniyor…</div></div></div>
<div id="fab"><div id="fab-info">Kupon: <b id="fc">0</b> maç</div><button id="fab-open" onclick="openK()">🎫 Kuponu Gör</button></div>
<div id="amod" onclick="outsideA(event)"><div id="amod-in"><div class="amod-head"><div><div class="amod-title" id="amod-title">Analiz</div><div class="amod-sub" id="amod-sub"></div></div><button class="mx" onclick="closeA()">×</button></div><div id="amod-body"></div></div></div>
<div id="kmod" onclick="outsideK(event)"><div id="kmod-in"><div class="mh"><div class="mt">🎫 Aktif Kupon</div><button class="mx" onclick="closeK()">×</button></div><div id="mcontent"></div><button class="msave" onclick="saveK()">💾 Kaydet</button><button class="mclr" onclick="clearK()">🗑 Temizle</button></div></div>
<script>
let cache={today:null,tomorrow:null},kupon={},saved=JSON.parse(localStorage.getItem('sc_kup')||'[]'),tab='live',subTab='iy',cdVal=30,cdTmr=null;const MM={};
async function fetchDay(offset){const key=offset===0?'today':'tomorrow';if(cache[key]) return cache[key];const url=(offset===0?'data/today.json':'data/tomorrow.json')+'?cb='+Date.now()+Math.random();const r=await fetch(url,{cache:'no-store'});if(!r.ok) throw new Error('Veri yüklenemedi');const j=await r.json();cache[key]=Array.isArray(j.data)?j.data:[];return cache[key];}
function isLive(m){if(!m.status) return false;const s=String(m.status).toLowerCase();return s==='live'||(s==='incomplete'&&Date.now()/1000>m.date_unix)}
function isDone(m){if(!m.status) return false;const s=String(m.status).toLowerCase();return s==='complete'||s==='finished'}
function isUp(m){return !isLive(m)&&!isDone(m)}
function formPills(str){if(!str) return '';return String(str).split('').slice(0,5).map(c=>{const cls=c==='W'?'W':c==='D'?'D':'L';return `<div class="fc ${cls}">${cls}</div>`}).join('')}
function logoImg(url,name,size=34){if(!url) return `<div class="tlogo-ph" style="width:${size}px;height:${size}px">⚽</div>`;let src=url;if(!url.startsWith('http')){src=url.startsWith('teams/')?`https://footystats.org/images/${url}`:`https://footystats.org/${url}`;}return `<img class="tlogo" style="width:${size}px;height:${size}px" src="${src}" alt="${name}" onerror="this.outerHTML='<div class=tlogo-ph style=\'width:${size}px;height:${size}px\'>⚽</div>'">`;}

function imagePathToCountry(path){if(!path) return '';const name=String(path).split('/').pop().toLowerCase();const raw=name.split('-')[0]||'';return raw.replace(/_/g,' ').trim();}
function countryToFlag(country){const map={'turkey':'🇹🇷','england':'🏴','wales':'🏴','scotland':'🏴','northern ireland':'🇬🇧','germany':'🇩🇪','spain':'🇪🇸','italy':'🇮🇹','france':'🇫🇷','netherlands':'🇳🇱','portugal':'🇵🇹','belgium':'🇧🇪','austria':'🇦🇹','switzerland':'🇨🇭','denmark':'🇩🇰','sweden':'🇸🇪','norway':'🇳🇴','finland':'🇫🇮','poland':'🇵🇱','czech republic':'🇨🇿','romania':'🇷🇴','greece':'🇬🇷','croatia':'🇭🇷','serbia':'🇷🇸','brazil':'🇧🇷','argentina':'🇦🇷','uruguay':'🇺🇾','colombia':'🇨🇴','chile':'🇨🇱','paraguay':'🇵🇾','usa':'🇺🇸','united states':'🇺🇸','mexico':'🇲🇽','japan':'🇯🇵','south korea':'🇰🇷','korea republic':'🇰🇷','china':'🇨🇳','saudi arabia':'🇸🇦','egypt':'🇪🇬','morocco':'🇲🇦','south africa':'🇿🇦'};return map[String(country||'').toLowerCase()]||'';}
function getTeamFlag(m,side){const image=side==='home'?(m.home_image||''):(m.away_image||'');const fromImage=countryToFlag(imagePathToCountry(image));if(fromImage) return fromImage;const fromField=countryToFlag(side==='home'?(m.home_country||m.team_a_country):(m.away_country||m.team_b_country));if(fromField) return fromField;const league=String(m.competition_name||'').toLowerCase();if(league.includes('süper lig')||league.includes('1. lig')) return '🇹🇷';if(league.includes('premier league')||league.includes('championship')||league.includes('league one')) return '🏴';if(league.includes('bundesliga')) return '🇩🇪';if(league.includes('la liga')||league.includes('segunda')) return '🇪🇸';if(league.includes('serie a')||league.includes('serie b')) return '🇮🇹';if(league.includes('ligue 1')||league.includes('ligue 2')) return '🇫🇷';if(league.includes('eredivisie')) return '🇳🇱';if(league.includes('primeira')||league.includes('liga nos')) return '🇵🇹';if(league.includes('jupiler')||league.includes('pro league')) return '🇧🇪';if(league.includes('mls')) return '🇺🇸';if(league.includes('brasil')||league.includes('brazil')) return '🇧🇷';if(league.includes('argentina')) return '🇦🇷';return '';}

async function renderKombin(){const t=await fetchDay(0),y=await fetchDay(1),all=dedupe([...t,...y]).filter(isUp),scored=all.map(m=>({m,a:analyze(m)})).filter(x=>x.a.score>0);const tekli=scored.filter(x=>x.a.score>=75).sort((a,b)=>b.a.score-a.a.score).slice(0,6);const guvenli=scored.filter(x=>{const a=x.a;const odd=a.pick==='1'?a.odd1:a.pick==='2'?a.odd2:a.oddX;return a.score>=65&&odd>=1.3&&odd<=2.5}).sort((a,b)=>b.a.score-a.a.score).slice(0,5);const guvenliOran=guvenli.reduce((acc,x)=>{const a=x.a;const odd=a.pick==='1'?a.odd1:a.pick==='2'?a.odd2:a.oddX;return acc*(odd||1)},1);const cilginPool=scored.filter(x=>{const m=x.m,odd1=parseFloat(m.odds_ft_1)||0,odd2=parseFloat(m.odds_ft_2)||0,btts=parseFloat(m.btts_potential)||0,ov25=parseFloat(m.o25_potential)||0,hppg=parseFloat(m.home_ppg??m.team_a_ppg)||0,appg=parseFloat(m.away_ppg??m.team_b_ppg)||0;return (appg>hppg+.3&&odd2>=1.8&&odd2<=4.5)||(hppg>appg+.2&&odd1>=2&&odd1<=5)||(ov25>=65&&(parseFloat(m.odds_ft_over25)||0)>=1.6)||(btts>=65&&(parseFloat(m.odds_btts_yes)||0)>=1.6)});const cilginRaw=[],cilginIds=new Set();for(const x of cilginPool.filter(x=>(parseFloat(x.m.away_ppg??x.m.team_b_ppg)||0)>(parseFloat(x.m.home_ppg??x.m.team_a_ppg)||0)+.3&&(parseFloat(x.m.odds_ft_2)||0)>=1.8).sort((a,b)=>b.a.score-a.a.score).slice(0,4)){if(!cilginIds.has(x.m.id)){cilginRaw.push({...x,a:{...x.a,pick:'2',odd2:parseFloat(x.m.odds_ft_2)||x.a.odd2}});cilginIds.add(x.m.id)}}for(const x of cilginPool.filter(x=>(parseFloat(x.m.odds_ft_1)||0)>=2&&(parseFloat(x.m.home_ppg??x.m.team_a_ppg)||0)>(parseFloat(x.m.away_ppg??x.m.team_b_ppg)||0)).sort((a,b)=>b.a.score-a.a.score).slice(0,4)){if(!cilginIds.has(x.m.id)){cilginRaw.push({...x,a:{...x.a,pick:'1',odd1:parseFloat(x.m.odds_ft_1)||x.a.odd1}});cilginIds.add(x.m.id)}}for(const x of cilginPool.filter(x=>(parseFloat(x.m.o25_potential)||0)>=65).sort((a,b)=>(parseFloat(b.m.o25_potential)||0)-(parseFloat(a.m.o25_potential)||0)).slice(0,4)){if(!cilginIds.has(x.m.id)){cilginRaw.push(x);cilginIds.add(x.m.id)}}const cilgin=cilginRaw.slice(0,12),cilginOran=cilgin.reduce((acc,x)=>{const a=x.a;const odd=a.pick==='1'?(parseFloat(x.m.odds_ft_1)||a.odd1):a.pick==='2'?(parseFloat(x.m.odds_ft_2)||a.odd2):(parseFloat(x.m.odds_ft_x)||a.oddX);return acc*(odd>1?odd:1)},1);const kombCard=(x,showScore=true)=>{const {m,a}=x,odd=a.pick==='1'?a.odd1:a.pick==='2'?a.odd2:a.oddX,pickLabel=a.pick==='1'?`1 (${m.home_name})`:a.pick==='2'?`2 (${m.away_name})`:'X',oddStr=odd>0?odd.toFixed(2):'-',scoreBar=showScore?`<div style="font-size:10px;color:var(--muted)">Güven: <span style="color:var(--accent)">${a.score}</span></div>`:'';return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border)"><div><div style="font-size:13px;font-weight:700">${m.home_name} – ${m.away_name}</div><div style="font-size:11px;color:var(--muted)">${m.competition_name||''} · ${fmtTime(m.date_unix)}</div>${scoreBar}</div><div style="text-align:right;flex-shrink:0;margin-left:10px"><div style="font-size:14px;font-weight:700;color:var(--gold)">${pickLabel}</div><div style="font-size:12px;color:var(--accent)">@${oddStr}</div></div></div>`};let h='';h+=`<div class="sh">🎯 TEKLİ BANKOLAR</div>`;h+=!tekli.length?`<div class="empty">Yeterli banko maç yok</div>`:`<div style="background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:14px">${tekli.map(x=>kombCard(x,true)).join('')}</div>`;h+=`<div class="sh">🔗 GÜVENLİ KOMBİNE</div>`;if(guvenli.length<2){h+=`<div class="empty">Yeterli maç yok</div>`}else{h+=`<div style="background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:6px">${guvenli.map(x=>kombCard(x,true)).join('')}</div><div style="background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;color:var(--muted)">${guvenli.length} maç · Toplam Oran</div><div style="font-size:20px;font-weight:700;color:var(--gold)">@${guvenliOran.toFixed(2)}</div></div>`}h+=`<div class="sh">🎲 ÇILGIN 12'Lİ</div>`;if(cilgin.length<8){h+=`<div class="empty">Yeterli maç yok<br><small>Yarınki maçlar eklenince dolacak</small></div>`}else{h+=`<div style="background:var(--card);border-radius:14px;overflow:hidden;margin-bottom:6px">${cilgin.map(x=>kombCard(x,false)).join('')}</div><div style="background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:12px;color:var(--muted)">${cilgin.length} maç · Toplam Oran</div><div style="font-size:20px;font-weight:700;color:var(--red)">@${cilginOran.toFixed(2)}</div></div>`}return h}
function renderKupon(){if(!saved.length) return `<div class="empty">📭 Kayıtlı kupon yok</div>`;return saved.slice().reverse().map((k,ri)=>{const idx=saved.length-1-ri;return `<div class="kcard"><div class="khead"><div class="kdate">${k.date}</div><div style="color:var(--accent);font-weight:700">${k.items.length} MAÇ</div></div>${k.items.map(it=>`<div class="krow2"><div style="font-size:12px;flex:1">${it.home} – ${it.away}</div><div class="mpick p${it.pick.toLowerCase()}">${it.pick}</div></div>`).join('')}<button class="kdel" onclick="delK(${idx})">🗑 Sil</button></div>`}).join('')}
async function go(t){tab=t;const tabs=['live','today','tomorrow','super','banko','ust05','kombin','sistem','kupon'];document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('on',tabs[i]===t));const hasSub=t==='sistem';document.getElementById('subtabs').classList.toggle('show',hasSub);document.getElementById('content').classList.toggle('withsub',hasSub);await render()}
async function setSub(s){subTab=s;const subs=['iy','ov25','xg','ht','card','daily','corner'];document.querySelectorAll('.stab').forEach((el,i)=>el.classList.toggle('on',subs[i]===s));await render()}
async function render(preserveScroll=false){const el=document.getElementById('content'),scrollTop=preserveScroll?el.scrollTop:0;if(!preserveScroll) el.innerHTML=`<div class="loading"><div class="spin"></div><div class="ltxt">Yükleniyor…</div></div>`;try{let h='';if(tab==='live') h=await renderLive();else if(tab==='today') h=await renderDay(0);else if(tab==='tomorrow') h=await renderDay(1);else if(tab==='super') h=await renderSuper();else if(tab==='banko') h=await renderBanko();else if(tab==='ust05') h=await renderUst05();else if(tab==='kombin') h=await renderKombin();else if(tab==='sistem') h=await renderSistem();else if(tab==='kupon') h=renderKupon();el.innerHTML=h;if(preserveScroll) el.scrollTop=scrollTop}catch(e){el.innerHTML=`<div class="err">❌ Hata: ${e.message}</div>`}}
function closeA(){document.getElementById('amod').classList.remove('on')}function outsideA(e){if(e.target.id==='amod') closeA()}
function cmpRow(label,hVal,aVal,higherBetter=true){const h=parseFloat(hVal)||0,a=parseFloat(aVal)||0,hW=higherBetter?h>a:h<a,aW=higherBetter?a>h:a<h,hd=h>0?h.toFixed(2):'-',ad=a>0?a.toFixed(2):'-';return `<div class="cmp-row"><div class="cv-h${hW?' w':''}">${hd}</div><div class="cv-l">${label}</div><div class="cv-a${aW?' w':''}">${ad}</div></div>`}
function statRow(label,val,suffix=''){const v=parseFloat(val)||0;if(!v) return '';const disp=suffix==='%'?Math.round(v)+'%':v.toFixed(2);const color=suffix==='%'&&v>=70?'var(--accent)':suffix==='%'&&v>=50?'var(--gold)':'var(--text)';return `<div class="stat-row"><div class="stat-lbl">${label}</div><div class="stat-val" style="color:${color}">${disp}</div></div>`}
function num(v){const n=parseFloat(v);return Number.isFinite(n)?n:0}
function buildFallbackAiText(m){const hN=m.home_name||'Ev Sahibi',aN=m.away_name||'Deplasman',hppg=num(m.home_ppg??m.team_a_ppg??m.pre_match_home_ppg),appg=num(m.away_ppg??m.team_b_ppg??m.pre_match_away_ppg),hxg=num(m.team_a_xg_prematch??m.team_a_xg),axg=num(m.team_b_xg_prematch??m.team_b_xg),btts=num(m.btts_potential),ov25=num(m.o25_potential??m.over25_potential),o05h=num(m.o05HT_potential),o1=num(m.odds_ft_1),o2=num(m.odds_ft_2),liveHome=m._h??m.homeGoalCount??0,liveAway=m._a??m.awayGoalCount??0,minute=m._min??m.elapsed??0,isLiveNow=isLive(m);const lines=[];if(isLiveNow) lines.push(`🔴 DURUM ÖZETİ: Maç şu an canlı. Skor ${liveHome}-${liveAway}${minute?` ve dakika ${minute}`:''}.`);else lines.push(`🔴 DURUM ÖZETİ: Gerçek AI yorumu henüz gelmedi. Bu yüzden aşağıdaki özet, mevcut prematch verilerden otomatik oluşturuldu.`);if(hxg>0||axg>0||hppg>0||appg>0){if(hxg>axg+.25||hppg>appg+.30) lines.push(`Ev sahibi tarafı verisel olarak bir adım önde görünüyor.`);else if(axg>hxg+.25||appg>hppg+.30) lines.push(`Deplasman tarafı verisel olarak bir adım önde görünüyor.`);else lines.push(`Taraf bahsinde net bir üstünlük yok; maç dengeli görünüyor.`)}let finalPick='PAS GEÇ';if(ov25>=62) finalPick='Üst 2.5';else if(btts>=60) finalPick='KG Var';else if(o05h>=68) finalPick='İY Üst 0.5';else if(o1>1&&o2>1){if(o1<o2&&(hxg>=axg||hppg>=appg)) finalPick='MS1';else if(o2<o1&&(axg>=hxg||appg>=hppg)) finalPick='MS2';else if(Math.abs(hxg-axg)<.20&&Math.abs(hppg-appg)<.20) finalPick='MSX'}if(isLiveNow){const totalGoals=Number(liveHome)+Number(liveAway);if(Number(minute)>=70&&totalGoals>=3){finalPick='PAS GEÇ';lines.push(`Dakika ilerlediği ve skor açıldığı için risk arttı; temkinli yaklaşım daha doğru.`)}else if(Number(minute)>=65&&totalGoals===0&&ov25>=62){finalPick='Kalan sürede gol çıkar';lines.push(`Prematch gol potansiyeli yüksekti; maç hâlâ golsüzse son bölümde gol arayışı mantıklı olabilir.`)}}let risk='Orta';if(finalPick==='PAS GEÇ') risk='Düşük işlem / korunma';else if(finalPick==='MS1'||finalPick==='MS2'||finalPick==='MSX') risk='Orta-Yüksek';else if(finalPick==='İY Üst 0.5'||finalPick==='Üst 2.5'||finalPick==='KG Var') risk='Orta';lines.push(`🎯 NİHAİ KARAR: ${finalPick}`);lines.push(`💰 KASA/RİSK: ${risk}`);return lines.join('\n\n')}
function getAiText(m){const raw=(m.boss_ai_decision||m.ai_comment||'').trim();return raw||buildFallbackAiText(m)}
function openAnaliz(id){const m=MM[id];if(!m) return;const hN=m.home_name||'?',aN=m.away_name||'?';document.getElementById('amod-title').textContent=`${hN} vs ${aN}`;document.getElementById('amod-sub').textContent=(m.competition_name||'')+(m.date_unix?' · '+fmtDate(m.date_unix):'');document.getElementById('amod').classList.add('on');const hppg=num(m.home_ppg??m.team_a_ppg??m.pre_match_home_ppg),appg=num(m.away_ppg??m.team_b_ppg??m.pre_match_away_ppg),hxg=num(m.team_a_xg_prematch??m.team_a_xg),axg=num(m.team_b_xg_prematch??m.team_b_xg),btts=num(m.btts_potential),ov25=num(m.o25_potential??m.over25_potential),o05HT=num(m.o05HT_potential),o1=num(m.odds_ft_1),ox=num(m.odds_ft_x),o2=num(m.odds_ft_2),obtts=num(m.odds_btts_yes),oov25=num(m.odds_ft_over25),oiy=num(m.odds_1st_half_over05),liveHome=(m._h??m.homeGoalCount??0),liveAway=(m._a??m.awayGoalCount??0),liveMin=(m._min??m.elapsed??0),aiText=getAiText(m);const k=kupon[id];let html=`<div class="asec"><div class="asec-title">🤖 BOSS AI RAPORU</div><div class="ai-box"><div class="ai-txt">${aiText}</div></div></div>`;html+=`<div class="asec"><div class="asec-title">📡 MAÇ DURUMU</div><div class="cmp-row"><div class="cv-h">${liveHome}</div><div class="cv-l">Skor</div><div class="cv-a">${liveAway}</div></div><div class="cmp-row"><div class="cv-h">${isLive(m)?'CANLI':(isDone(m)?'BİTTİ':'BEKLİYOR')}</div><div class="cv-l">Durum</div><div class="cv-a">${liveMin?`${liveMin}'`:'-'}</div></div></div>`;html+=`<div class="asec"><div class="asec-title">📊 ÇEKİRDEK KARŞILAŞTIRMA</div>${cmpRow('PPG',hppg,appg,true)}${cmpRow('xG',hxg,axg,true)}${cmpRow('1X2 Oranı',o1||'-',o2||'-',false)}</div>`;html+=`<div class="asec"><div class="asec-title">⚽ GOL SİNYALLERİ</div>${statRow('KG Var Potansiyeli',btts,'%')}${statRow('Üst 2.5 Potansiyeli',ov25,'%')}${statRow('İY Üst 0.5 Potansiyeli',o05HT,'%')}${obtts>0?statRow('KG Var Oranı',obtts):''}${oov25>0?statRow('Üst 2.5 Oranı',oov25):''}${oiy>0?statRow('İY Üst 0.5 Oranı',oiy):''}${!(btts||ov25||o05HT||obtts||oov25||oiy)?`<div style="color:var(--muted);font-size:12px;padding:6px 0">Bu maç için gol market verisi sınırlı.</div>`:''}</div>`;html+=`<div class="asec"><div class="asec-title">🎫 KUPONA EKLE</div><div class="kup-btns"><button id="kbtn1-${id}" class="kup-btn${k?.pick==='1'?' a1':''}" onclick="betA('${id}','1')">1 · ${o1>0?o1.toFixed(2):'-'}</button><button id="kbtnX-${id}" class="kup-btn${k?.pick==='X'?' ax':''}" onclick="betA('${id}','X')">X · ${ox>0?ox.toFixed(2):'-'}</button><button id="kbtn2-${id}" class="kup-btn${k?.pick==='2'?' a2':''}" onclick="betA('${id}','2')">2 · ${o2>0?o2.toFixed(2):'-'}</button></div></div>`;document.getElementById('amod-body').innerHTML=html}
function betA(id,pick){const m=MM[id];if(!m) return;if(kupon[id]?.pick===pick) delete kupon[id];else kupon[id]={home:m.home_name||'?',away:m.away_name||'?',pick,league:m.competition_name||''};updFab();const k=kupon[id];['1','X','2'].forEach(p=>{const btn=document.getElementById(`kbtn${p}-${id}`);if(!btn) return;btn.className='kup-btn'+(k?.pick===p?(p==='1'?' a1':p==='X'?' ax':' a2'):'')})}
function bet(id,pick){const m=MM[id];if(!m) return;if(kupon[id]?.pick===pick) delete kupon[id];else kupon[id]={home:m.home_name||'?',away:m.away_name||'?',pick,league:m.competition_name||''};updFab();render()}

function openK(){const items=Object.values(kupon);if(!items.length){alert('Kupon boş!');return}document.getElementById('mcontent').innerHTML=items.map(it=>`<div class="mrow"><div style="font-size:12px;flex:1">${it.home} – ${it.away}</div><div class="mpick p${it.pick.toLowerCase()}">${it.pick}</div></div>`).join('');document.getElementById('kmod').classList.add('on')}
function closeK(){document.getElementById('kmod').classList.remove('on')}function outsideK(e){if(e.target.id==='kmod') closeK()}
function saveK(){const items=Object.values(kupon);if(!items.length) return;saved.push({date:new Date().toLocaleString('tr-TR'),items});localStorage.setItem('sc_kup',JSON.stringify(saved));kupon={};updFab();closeK();alert('✅ Kupon kaydedildi!')}
function clearK(){kupon={};updFab();closeK();render()}function delK(i){saved.splice(i,1);localStorage.setItem('sc_kup',JSON.stringify(saved));render()}
async function doRefresh(auto=false){cache.today=null;cache.tomorrow=null;if(!auto){cdVal=30;document.getElementById('cd').textContent=30}await render(auto)}

render();startCD();
