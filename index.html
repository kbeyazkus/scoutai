<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b0c10">
<title>ScoutAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0c10;--bg2:#111318;--bg3:#171a22;--card:#161921;--soft:#1d2230;--border:#2a3142;
  --text:#eef2ff;--muted:#8c97b3;--accent:#00d18f;--accent2:#6c7cff;--red:#ff5d73;--gold:#f7c65c;
  --blue:#56b6ff;--chip:#202636;--shadow:0 10px 30px rgba(0,0,0,.28);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;overflow:hidden}
button,input{font:inherit}
a{text-decoration:none;color:inherit}
#app{height:100%;display:flex;flex-direction:column}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(180deg,rgba(11,12,16,.98),rgba(11,12,16,.94));backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.brand{font-weight:800;letter-spacing:.04em;font-size:20px}
.brand span{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.meta{display:flex;align-items:center;gap:10px}
.refresh{background:var(--chip);border:1px solid var(--border);color:var(--muted);padding:8px 10px;border-radius:12px;cursor:pointer}
.tabs{display:flex;overflow:auto;scrollbar-width:none;padding:0 8px 10px;gap:8px}
.tabs::-webkit-scrollbar{display:none}
.tab{border:1px solid var(--border);background:transparent;color:var(--muted);padding:10px 14px;border-radius:14px;white-space:nowrap;font-weight:700;cursor:pointer}
.tab.active{background:linear-gradient(135deg,rgba(0,209,143,.15),rgba(108,124,255,.16));border-color:rgba(108,124,255,.45);color:var(--text)}
.source-tabs{display:flex;padding:0 12px;gap:6px;margin-top:2px}
.stab{flex:1;border:1px solid var(--border);background:transparent;color:var(--muted);padding:11px 10px;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;text-align:center;transition:.15s}
.stab.active{border-color:rgba(108,124,255,.55);color:var(--text);background:linear-gradient(135deg,rgba(0,209,143,.12),rgba(108,124,255,.18))}
.stab .badge{display:inline-block;background:var(--soft);border-radius:999px;font-size:10px;padding:2px 6px;margin-left:5px;color:var(--muted)}
.stab.active .badge{background:rgba(108,124,255,.25);color:var(--accent2)}
.updated{font-size:11px;color:var(--muted);font-weight:600}
.chip.live-chip.active{background:rgba(255,93,115,.18);color:var(--red)}
.src-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:999px;letter-spacing:.04em}
.src-badge.fs{background:rgba(247,198,92,.14);color:var(--gold)}
.src-badge.sm{background:rgba(108,124,255,.14);color:var(--accent2)}
.toast-wrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:rgba(17,19,24,.97);border:1px solid var(--border);border-radius:16px;padding:12px 18px;font-size:13px;font-weight:700;color:var(--text);box-shadow:var(--shadow);animation:toastIn .3s ease;white-space:nowrap}
.toast.goal{border-color:rgba(247,198,92,.6);color:var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.subbar{padding:0 12px 12px;display:flex;gap:8px;overflow:auto;scrollbar-width:none}
.subbar::-webkit-scrollbar{display:none}
.chip{border:none;background:var(--chip);color:var(--muted);padding:8px 10px;border-radius:999px;font-size:12px;font-weight:700;white-space:nowrap;cursor:pointer}
.chip.active{background:rgba(0,209,143,.18);color:var(--accent)}
.content{flex:1;overflow:auto;padding:14px 12px 90px}
.section{margin-bottom:14px}
.league-card{border:1px solid var(--border);border-radius:18px;overflow:hidden;background:var(--card);box-shadow:var(--shadow);margin-bottom:12px}
.league-head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);border-bottom:1px solid var(--border)}
.league-flag{width:30px;height:30px;border-radius:999px;background:var(--soft);display:grid;place-items:center;font-size:16px;overflow:hidden}
.league-flag img{width:100%;height:100%;object-fit:cover}
.league-title{font-weight:800;font-size:14px}
.league-sub{font-size:11px;color:var(--muted);margin-top:2px}
.match-row{display:grid;grid-template-columns:48px 1fr auto;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:.15s background}
.match-row:last-child{border-bottom:none}
.match-row:active{background:rgba(255,255,255,.03)}
.minute{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--red);font-weight:700}
.minute .dot{width:7px;height:7px;border-radius:50%;background:var(--red);margin-top:4px;animation:pulse 1.2s infinite}
.minute.ht{color:var(--gold)}
.minute.ht .dot{background:var(--gold);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.match-main{display:flex;flex-direction:column;gap:8px}
.team-line{display:flex;align-items:center;gap:8px;min-height:22px}
.team-line img,.team-line .ph{width:22px;height:22px;border-radius:6px;background:var(--soft);object-fit:contain;flex-shrink:0}
.team-name{font-size:14px;font-weight:700;line-height:1.2}
.team-name.win{color:#fff;font-weight:800}.team-name.lose{color:var(--muted)}
.team-score{display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:7px;min-width:26px;font-family:'DM Mono',monospace;font-size:17px;font-weight:700}
.team-score .win{color:#fff}.team-score .lose{color:var(--muted)}
.row-footer{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:800;padding:4px 7px;border-radius:999px;letter-spacing:.02em}
.tag.green{background:rgba(0,209,143,.15);color:var(--accent)}
.tag.blue{background:rgba(86,182,255,.14);color:var(--blue)}
.tag.gold{background:rgba(247,198,92,.14);color:var(--gold)}
.tag.red{background:rgba(255,93,115,.14);color:var(--red)}
.tag.purple{background:rgba(108,124,255,.14);color:var(--accent2)}
.quick-add{padding:8px 10px;background:var(--soft);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer}
.quick-add.active{background:rgba(0,209,143,.16);border-color:rgba(0,209,143,.45);color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);z-index:200;display:none;align-items:flex-end}
.overlay.open{display:flex}
.sheet{width:100%;max-height:93vh;background:var(--bg2);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sheet-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(255,255,255,.02),transparent)}
.sheet-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sheet-title{font-size:18px;font-weight:800}
.sheet-sub{font-size:12px;color:var(--muted);margin-top:4px}
.close-btn{width:34px;height:34px;border:none;background:var(--soft);color:var(--text);border-radius:12px;cursor:pointer}
.score-panel{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding-top:12px}
.club{text-align:center}
.club img,.club .ph{width:52px;height:52px;border-radius:14px;background:var(--soft);object-fit:contain}
.club-name{font-size:13px;font-weight:700;margin-top:6px}
.center-score{text-align:center}
.center-score .num{font-family:'DM Mono',monospace;font-size:30px;font-weight:700;letter-spacing:.04em}
.center-score .meta{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.detail-tabs{display:flex;gap:8px;overflow:auto;scrollbar-width:none;padding:12px}
.detail-tabs::-webkit-scrollbar{display:none}
.dtab{background:transparent;border:1px solid var(--border);color:var(--muted);padding:10px 12px;border-radius:12px;font-weight:700;white-space:nowrap;cursor:pointer}
.dtab.active{background:rgba(108,124,255,.15);border-color:rgba(108,124,255,.45);color:#fff}
.sheet-body{flex:1;overflow:auto;padding:0 12px 110px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
.panel h3{font-size:12px;color:var(--muted);letter-spacing:.08em;margin-bottom:10px;text-transform:uppercase}
.kv{display:grid;grid-template-columns:1fr auto;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.kv:last-child{border-bottom:none;padding-bottom:0}
.kv span:last-child{font-weight:700;text-align:right}
.twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-row{display:grid;grid-template-columns:64px 1fr 64px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.stat-row:last-child{border-bottom:none}
.stat-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:700}
.stat-label{text-align:center;color:var(--muted);font-size:11px;font-weight:700}
.bar{height:8px;background:var(--soft);border-radius:999px;overflow:hidden;position:relative}
.bar > i{position:absolute;inset:0 auto 0 0;background:linear-gradient(90deg,var(--accent),var(--accent2));display:block}
.timeline{display:flex;flex-direction:column;gap:10px}
.event{display:grid;grid-template-columns:56px 1fr;gap:10px;align-items:flex-start}
.event-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--gold);font-weight:700;text-align:right;padding-top:2px}
.event-card{background:var(--soft);border:1px solid var(--border);border-radius:14px;padding:10px 12px}
.event-type{font-size:11px;color:var(--muted);text-transform:uppercase;font-weight:800;letter-spacing:.06em;margin-bottom:4px}
.event-line{font-size:13px;line-height:1.45}
.lineup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.player{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.player:last-child{border-bottom:none}
.player img,.player .ph{width:28px;height:28px;border-radius:8px;background:var(--soft);object-fit:cover}
.player .meta{font-size:11px;color:var(--muted)}
.news-line{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;line-height:1.55}
.news-line:last-child{border-bottom:none}
.ai-box{background:linear-gradient(135deg,rgba(0,209,143,.08),rgba(108,124,255,.12));border:1px solid rgba(108,124,255,.35);border-radius:18px;padding:14px;white-space:pre-wrap;line-height:1.7;font-size:14px}
.bottom-bar{position:absolute;left:0;right:0;bottom:0;padding:12px;border-top:1px solid var(--border);background:linear-gradient(180deg,rgba(17,19,24,.92),rgba(17,19,24,.98));display:flex;gap:8px}
.bottom-bar button{flex:1;border:none;border-radius:14px;padding:14px 12px;font-weight:800;cursor:pointer}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04140d}
.btn-secondary{background:var(--soft);color:var(--text);border:1px solid var(--border)}
.kpanel{position:fixed;right:12px;left:12px;bottom:12px;z-index:130;background:rgba(17,19,24,.96);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:12px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.kpanel small{display:block;color:var(--muted);font-size:11px}
.kpanel strong{font-size:15px}
.empty,.loading{padding:28px 16px;text-align:center;color:var(--muted)}
.hidden{display:none!important}
.coach-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.coach-row:last-child{border-bottom:none}
.coach-role{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.coach-name{font-size:13px;font-weight:700;margin-top:2px}
.sidelined-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.sidelined-row:last-child{border-bottom:none}
.sidelined-badge{font-size:10px;font-weight:800;padding:3px 7px;border-radius:999px;white-space:nowrap}
.sidelined-badge.injury{background:rgba(255,93,115,.15);color:var(--red)}
.sidelined-badge.suspension{background:rgba(247,198,92,.15);color:var(--gold)}
.trend-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.trend-row:last-child{border-bottom:none}
.trend-bar-wrap{flex:1;height:6px;background:var(--soft);border-radius:999px;overflow:hidden}
.trend-bar-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.pressure-chart{display:flex;align-items:flex-end;gap:3px;height:60px;padding:8px 0}
.pressure-bar{flex:1;border-radius:4px 4px 0 0;min-width:8px;transition:.2s}
.pressure-bar.home{background:var(--accent)}
.pressure-bar.away{background:var(--accent2)}
.comment-line{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;line-height:1.55;color:var(--muted)}
.comment-line:last-child{border-bottom:none}
.ppg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.ppg-card{background:var(--soft);border-radius:14px;padding:10px 12px;text-align:center}
.ppg-card .val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;color:var(--accent)}
.ppg-card .lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;margin-top:2px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="topbar">
      <div class="brand"><span>ScoutAI</span></div>
      <div class="meta"><span class="updated" id="updatedAt"></span><button class="refresh" id="refreshBtn">↺</button></div>
    </div>
    <div class="source-tabs" id="sourceTabs"></div>
    <div class="subbar" id="subChips"></div>
  </div>
  <div class="content" id="content"><div class="loading">Yükleniyor…</div></div>
</div>
<div class="overlay" id="overlay">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-top">
        <div>
          <div class="sheet-title" id="sheetTitle">Maç Merkezi</div>
          <div class="sheet-sub" id="sheetSub"></div>
        </div>
        <button class="close-btn" id="closeSheet">×</button>
      </div>
      <div class="score-panel" id="scorePanel"></div>
    </div>
    <div class="detail-tabs" id="detailTabs"></div>
    <div class="sheet-body" id="sheetBody"></div>
    <div class="bottom-bar">
      <button class="btn-secondary" id="closeSheet2">Kapat</button>
      <button class="btn-primary" id="detailAi">AI Önerisi</button>
    </div>
  </div>
</div>
<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {
  source: 'footystats',
  sub:    'live',
  detailTab: 'overview',
  fs:  { today:[], tomorrow:[], live:[] },
  sm:  { today:[], tomorrow:[], live:[] },
  bundle: { fixtures:{} },
  current: null,
  prevScores: {},
};
const SOURCE_TABS=[{key:'footystats',label:'FootyStats'},{key:'sportmonks',label:'Sportmonks'}];
const SUB_FILTERS=[{key:'live',label:'🔴 Canlı',cls:'live-chip'},{key:'today',label:'📅 Bugün'},{key:'tomorrow',label:'📆 Yarın'}];
const DETAIL_TABS=[
  {key:'overview',label:'Genel'},{key:'stats',label:'İstatistik'},{key:'timeline',label:'Olaylar'},
  {key:'lineups',label:'Kadrolar'},{key:'xg',label:'xG'},{key:'odds',label:'Oranlar'},
  {key:'prediction',label:'Prediction'},{key:'h2h',label:'H2H'},{key:'news',label:'Haber'},
  {key:'ai',label:'ScoutAI'},{key:'sidelined',label:'Sakatlık'},{key:'trends',label:'Trends'},
  {key:'pressure',label:'Baskı'},{key:'coaches',label:'Teknik Ekip'},{key:'comments',label:'Yorumlar'},
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
const dm=v=>Number.isFinite(Number(v))?Number(v):0;
function fmtTime(ts){ if(!ts) return '--:--'; return new Date(ts*1000).toLocaleString('tr-TR',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit',timeZone:'Europe/Berlin'}); }
function fmtMinute(row){ const e=row.elapsed; if(e==='HY'||e==='HT') return ['HT',true]; if(dm(e)>0) return [dm(e)+"'",false]; if(row.status==='live') return ['CANLI',false]; return [fmtTime(row.date_unix),false]; }
function flagEmoji(country){ const map={Turkey:'🇹🇷','Türkiye':'🇹🇷',England:'🏴',Germany:'🇩🇪',Spain:'🇪🇸',Italy:'🇮🇹',France:'🇫🇷',Netherlands:'🇳🇱',Portugal:'🇵🇹',Belgium:'🇧🇪',Brazil:'🇧🇷',Argentina:'🇦🇷',Denmark:'🇩🇰',Poland:'🇵🇱'}; return map[country]||'⚽'; }
function normalizeImg(url){ if(!url) return ''; const u=String(url).trim(); if(!u) return ''; if(u.startsWith('http')||u.startsWith('//')) return u.startsWith('//')?'https:'+u:u; if(u.startsWith('teams/')||u.startsWith('leagues/')||u.startsWith('countries/')) return 'https://footystats.org/images/'+u; return 'https://footystats.org/'+u.replace(/^\/+/,''); }
function imgOrPh(url,text,size=22){ const src=normalizeImg(url); const init=(text||'?')[0].replace(/'/g,"\'"); if(src) return `<img src="${src}" alt="" style="width:${size}px;height:${size}px;object-fit:contain;border-radius:10px" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',innerText:'${init}',style:'width:${size}px;height:${size}px;display:grid;place-items:center'}))">`; return `<div class="ph" style="width:${size}px;height:${size}px;display:grid;place-items:center">${(text||'?')[0]}</div>`; }
function rowScore(row){ return [dm(row._h??row.homeGoalCount??0),dm(row._a??row.awayGoalCount??0)]; }
function isLive(row){ const s=String(row.status||'').toLowerCase(); return ['live','inplay','paused'].includes(s)||row.elapsed==='HY'||row.elapsed==='HT'; }
function dedupeById(arr){ const seen=new Set(); return arr.filter(r=>{ const k=String(r.id||''); if(seen.has(k)) return false; seen.add(k); return true; }); }

// ─── TOAST / GOAL DETECTION ──────────────────────────────────────────────────
function showToast(msg,type=''){
  const wrap=$('toastWrap'); const el=document.createElement('div');
  el.className='toast'+(type?' '+type:''); el.textContent=msg; wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .4s'; setTimeout(()=>el.remove(),400); },4000);
}
function checkGoals(rows){
  for(const r of rows){
    const key=String(r.id); const [h,a]=rowScore(r); const prev=state.prevScores[key];
    if(prev&&(h>prev.h||a>prev.a)){
      const scorer=h>prev.h?r.home_name:r.away_name;
      showToast(`⚽ GOL! ${r.home_name} ${h}-${a} ${r.away_name} (${scorer})`,'goal');
    }
    state.prevScores[key]={h,a};
  }
}

// ─── CURRENT DATA ─────────────────────────────────────────────────────────────
function currentRows(){
  const src=state.source==='footystats'?state.fs:state.sm;
  if(state.sub==='live')     return src.live;
  if(state.sub==='today')    return src.today.filter(r=>!isLive(r));
  if(state.sub==='tomorrow') return src.tomorrow;
  return [];
}

// ─── BUNDLE / ANALYZE ────────────────────────────────────────────────────────
function getBundle(row){
  const smid=String(row?.source_ids?.sportmonks||row?.sportmonks_id||'');
  if(smid&&state.bundle.fixtures?.[smid]) return state.bundle.fixtures[smid];
  for(const[,bdata] of Object.entries(state.bundle.fixtures||{})){
    const parts=(bdata?.detail?.participants||[]).map(p=>(p.name||'').toLowerCase());
    if(parts.some(n=>n.includes((row.home_name||'').toLowerCase().slice(0,5)))&&parts.some(n=>n.includes((row.away_name||'').toLowerCase().slice(0,5)))) return bdata;
  }
  return null;
}
function analyzeRow(row){
  const bundle=getBundle(row)||{}; const detail=bundle.detail||{};
  const o25=dm(row.o25_potential); const btts=dm(row.btts_potential); const iy=dm(row.o05HT_potential); const press=dm(row.pressure_score);
  const pred=detail.predictions||[]; const predMap={};
  pred.forEach(x=>{ const dev=String(x.type?.developer_name||'').toUpperCase(); predMap[dev]=x.predictions||{}; });
  const o25f=o25||dm(predMap.OVER_UNDER_2_5_PROBABILITY?.yes);
  const bttsf=btts||dm(predMap.BTTS_PROBABILITY?.yes);
  const iyf=iy||dm(predMap.OVER_UNDER_0_5_1ST_HALF_PROBABILITY?.yes);
  const tags=[];
  if(press>=8) tags.push(['Home Pressure','green']); else if(press<=-8) tags.push(['Away Pressure','blue']);
  if(o25f>=62) tags.push(['Over 2.5','gold']); if(bttsf>=60) tags.push(['Both Teams Score','purple']); if(iyf>=70) tags.push(['1H Goal','green']);
  let rec='No Bet / Skip';

  // Build score map: SM ID + name-based (fuzzy) for robust matching
  const scoreMapById={}, scoreMapByName={};
  for(const m of smLive){
    const smid=String(m?.source_ids?.sportmonks||m?.sportmonks_id||m.id||'').replace('sm-','');
    if(smid) scoreMapById[smid]=m;
    const k=((m.home_name||'')+'_'+(m.away_name||'')).toLowerCase().replace(/[^a-z0-9_]/g,'');
    scoreMapByName[k]=m;
  }
  function fuzzyMatchLive(r){
    // 1. Try SM ID match
    const smid=String(r?.source_ids?.sportmonks||r?.sportmonks_id||'').replace('sm-','');
    if(smid && scoreMapById[smid]) return scoreMapById[smid];
    // 2. Try exact name match
    const k=((r.home_name||'')+'_'+(r.away_name||'')).toLowerCase().replace(/[^a-z0-9_]/g,'');
    if(scoreMapByName[k]) return scoreMapByName[k];
    // 3. Try partial name match (first 6 chars)
    const hk=(r.home_name||'').toLowerCase().slice(0,6).replace(/[^a-z]/g,'');
    const ak=(r.away_name||'').toLowerCase().slice(0,6).replace(/[^a-z]/g,'');
    if(hk && ak){
      for(const[,m] of Object.entries(scoreMapById)){
        const mh=(m.home_name||'').toLowerCase().slice(0,6).replace(/[^a-z]/g,'');
        const ma=(m.away_name||'').toLowerCase().slice(0,6).replace(/[^a-z]/g,'');
        if(mh===hk && ma===ak) return m;
      }
    }
    return null;
  }
  function overlayLive(rows){ return rows.map(r=>{ const lm=fuzzyMatchLive(r); if(!lm) return r; return {...r,_h:lm.homeGoalCount??r.homeGoalCount,_a:lm.awayGoalCount??r.awayGoalCount,_min:lm.elapsed??r.elapsed,status:'live',elapsed:lm.elapsed??r.elapsed,live_comment:r.live_comment||lm.live_comment||lm.boss_ai_decision||'',boss_ai_decision:r.boss_ai_decision||lm.boss_ai_decision||''}; }); }
  state.fs.today   =dedupeById(overlayLive(fsToday));
  state.fs.tomorrow=dedupeById(fsTomorrow);
  state.fs.live    =dedupeById([...fsLive.filter(isLive),...overlayLive(fsToday).filter(isLive)]);
  state.sm.today   =dedupeById(overlayLive(smToday));
  state.sm.tomorrow=dedupeById(smTomorrow);
  state.sm.live    =dedupeById(smLive.filter(isLive));
  const now=new Date().toLocaleString('tr-TR',{hour:'2-digit',minute:'2-digit',timeZone:'Europe/Berlin'});
  $('updatedAt').textContent=`${now}`;
  renderMain();
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  const src=e.target.closest('[data-source]'); if(src){ state.source=src.dataset.source; state.sub='live'; renderMain(); return; }
  const sub=e.target.closest('[data-sub]'); if(sub){ state.sub=sub.dataset.sub; renderMain(); return; }
  const open=e.target.closest('[data-open]'); if(open){ openDetail(open.dataset.open); return; }
  const dtab=e.target.closest('[data-dtab]'); if(dtab){ state.detailTab=dtab.dataset.dtab; renderDetailBody(); return; }
});
$('refreshBtn').addEventListener('click',loadData);
$('closeSheet').addEventListener('click',closeDetail);
$('closeSheet2').addEventListener('click',closeDetail);
$('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay') closeDetail(); });
$('detailAi').addEventListener('click',()=>{ state.detailTab='ai'; renderDetailBody(); });
setInterval(()=>{ if(state.sub==='live') loadData(); },60000);
loadData();
</script>
<div class="toast-wrap" id="toastWrap"></div>
